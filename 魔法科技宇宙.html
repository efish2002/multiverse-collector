<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>✨ 魔法科技宇宙 - 多元宇宙概念收集者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a0a2e 0%, #2e1a4e 50%, #4a2e6e 100%); color: #e0e0e0; line-height: 1.8; min-height: 100vh; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        h1 { font-size: clamp(1.5em, 5vw, 2.5em); margin-bottom: 10px; background: linear-gradient(135deg, #ff66ff, #9966ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-bar { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .status-item { font-size: 0.95em; }
        .scene { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,102,255,0.2); }
        .scene-title { font-size: clamp(1.3em, 4vw, 1.8em); margin-bottom: 15px; color: #ff66ff; }
        .scene-text { font-size: clamp(1em, 3.5vw, 1.1em); margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: linear-gradient(135deg, rgba(255,102,255,0.2), rgba(153,102,255,0.2)); border: 2px solid rgba(255,102,255,0.5); color: #e0e0e0; padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 25px); border-radius: 10px; font-size: clamp(1em, 3.5vw, 1.1em); cursor: pointer; transition: all 0.3s; text-align: left; min-height: 44px; }
        .choice-btn:hover { background: rgba(255,102,255,0.3); transform: translateX(5px); }
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
        .nav-btn:hover { background: rgba(255,102,255,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 魔法科技宇宙</h1>
            <div class="status-bar">
                <div class="status-item">📦 概念：<span id="concept-count">0</span>/20</div>
                <div class="status-item">⭐ 得分：<span id="score">0</span></div>
                <div class="status-item">🏆 成就：<span id="achievement-count">0</span></div>
            </div>
        </header>
        <div id="game-container"></div>
    </div>
    <div class="nav-bar">
        <a href="宇宙入口.html" class="nav-btn">🏠 返回入口</a>
        <a href="赛博朋克宇宙.html" class="nav-btn">🌃 赛博朋克</a>
        <a href="太空歌剧宇宙.html" class="nav-btn">🚀 太空歌剧</a>
        <a href="时间旅行宇宙.html" class="nav-btn">⏳ 时间旅行</a>
        <a href="生物朋克宇宙.html" class="nav-btn">🧬 生物朋克</a>
    </div>
    <script>
        const gameData = { concepts: [], score: 0, achievements: [] };
        const scenes = {
            "magic_intro": {
                title: "✨ 魔法科技宇宙 - 魔法学院",
                text: `你穿过光门，发现自己站在一座宏伟的学院大厅中。

穹顶上绘制着星图，但那些星星在缓缓移动，仿佛在遵循某种神秘的规律。空气中弥漫着魔力波动，让你的皮肤微微刺痛。

"欢迎来到新亚特兰蒂斯魔法学院。"一个温和的声音响起。

你看到一位身着紫色长袍的老者，他的胡须和头发都是银白色的，手中握着一根镶嵌着水晶的法杖。

"我是梅林博士，这里的院长。"他微笑着说，眼中闪烁着智慧的光芒，"在这个宇宙中，魔法与科技已经融合。我们用科学方法研究魔法，用魔法增强科技。"

他指向三个方向，每个方向都代表着魔科融合的不同领域：`,
                choices: [
                    { text: "📜 前往符文编程室", next: "magic_rune" },
                    { text: "💫 探索灵能引擎车间", next: "magic_psi_engine" },
                    { text: "🔮 参观水晶能源中心", next: "magic_crystal" }
                ]
            },
            "magic_rune": {
                title: "📜 符文编程室 - 魔法代码",
                text: `你走进一个充满神秘符号的房间。墙壁上刻满了发光的符文，它们按照特定的顺序排列，形成复杂的程序结构。

"符文编程是魔法与计算机科学的融合。"年轻的程序员说，"每个符文代表一个函数，符文序列就是代码。"

她指着墙上一个发光的符文阵列："这是一个搜索算法。用传统代码需要 100 行，用符文只需要 7 个符号。"

符文闪烁着，执行着某种计算。`,
                choices: [
                    { text: "📖 学习符文编程原理", next: "magic_rune_study", concept: "符文编程" },
                    { text: "🔙 返回魔法学院", next: "magic_intro" }
                ]
            },
            "magic_rune_study": {
                title: "📖 符文编程原理",
                text: `"符文的力量来自于它们的象征意义。"程序员解释道。

她调出一个全息投影，显示着基础符文表：
- 启动符文：◈ 开始执行
- 循环符文：∞ 重复操作
- 条件符文：⌖ 如果...则...
- 输出符文：◉ 显示结果

"但符文编程不仅仅是语法。"她说，"你需要理解每个符文背后的魔法本质。写符文代码时，你实际上是在编织现实的纤维。"`,
                choices: [
                    { text: "🔙 返回编程室", next: "magic_rune" }
                ]
            },
            "magic_psi_engine": {
                title: "💫 灵能引擎车间 - 心灵能量",
                text: `你走进一个充满嗡鸣声的车间，中央是一个巨大的球形装置，表面流动着紫色的光芒。

"这是灵能引擎。"工程师说，"它利用心灵能量作为动力源。"

"心灵能量？"

"是的。意识、情感、意志——这些都是能量形式。灵能引擎可以收集、储存、转化这些能量。"

球体内部，紫色的能量在旋转，发出柔和的光芒。`,
                choices: [
                    { text: "⚡ 了解灵能转化原理", next: "magic_psi_study", concept: "灵能引擎" },
                    { text: "🔙 返回魔法学院", next: "magic_intro" }
                ]
            },
            "magic_psi_study": {
                title: "⚡ 灵能转化原理",
                text: `"灵能转化的关键在于共振。"工程师说。

她调出一个图表，显示着脑电波与灵能的对应关系：
- α波（放松）：低强度灵能
- β波（专注）：中强度灵能
- γ波（高度集中）：高强度灵能
- θ波（冥想）：特殊灵能

"通过训练，魔法师可以控制自己的脑电波，产生特定类型和强度的灵能。"

"那普通人呢？"

"我们有灵能放大器。但效果不如训练有素的魔法师。"`,
                choices: [
                    { text: "🔙 返回车间", next: "magic_psi_engine" }
                ]
            },
            "magic_crystal": {
                title: "🔮 水晶能源中心 - 魔法电池",
                text: `你走进一座巨大的大厅，里面排列着数千个水晶柱。

每个水晶都在发光，颜色各异：红色、蓝色、绿色、紫色...

"这些是能源水晶。"技师说，"它们可以储存魔法能量，就像电池储存电能一样。"

她拿起一块蓝色的水晶，"这是最常见的魔力水晶。一块标准水晶可以为一个家庭提供一周的魔法能源。"`,
                choices: [
                    { text: "💎 学习水晶能源技术", next: "magic_crystal_study", concept: "水晶能源" },
                    { text: "🔙 返回魔法学院", next: "magic_intro" }
                ]
            },
            "magic_crystal_study": {
                title: "💎 水晶能源技术",
                text: `"水晶能源的关键是晶格结构。"技师解释道。

她调出一个全息投影，显示着水晶的原子结构：

"魔法能量被储存在晶格的缺陷中。不同的掺杂元素产生不同类型的能量：
- 铁掺杂：火系能量（红色）
- 铜掺杂：水系能量（蓝色）
- 银掺杂：光系能量（白色）
- 金掺杂：奥术能量（紫色）"

"水晶可以充能吗？"

"当然。魔法师可以向水晶注入魔力，或者使用灵能引擎充电。"`,
                choices: [
                    { text: "🔙 返回中心", next: "magic_crystal" }
                ]
            }
        };
        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) { document.getElementById('game-container').innerHTML = '<div class="scene"><h2 class="scene-title">❌ 场景不存在</h2><div class="choices"><button class="choice-btn" onclick="renderScene(\'magic_intro\')">🔙 返回入口</button></div></div>'; return; }
            let choicesHtml = scene.choices.map(choice => { const concept = choice.concept ? `, "${choice.concept}"` : ''; return `<button class="choice-btn" onclick="navigateTo('${choice.next}'${concept})">${choice.text}</button>`; }).join('');
            document.getElementById('game-container').innerHTML = '<div class="scene fade-in"><h2 class="scene-title">' + scene.title + '</h2><div class="scene-text">' + scene.text + '</div><div class="choices">' + choicesHtml + '</div></div>';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function navigateTo(sceneId, conceptName) {
            if (conceptName && !gameData.concepts.includes(conceptName)) { gameData.concepts.push(conceptName); gameData.score += 10; alert('📦 获得新概念：' + conceptName + ' (+10 分)'); updateStatus(); }
            renderScene(sceneId);
        }
        function updateStatus() { document.getElementById('concept-count').textContent = gameData.concepts.length; document.getElementById('score').textContent = gameData.score; document.getElementById('achievement-count').textContent = gameData.achievements.length; }
        renderScene('magic_intro');
    </script>
</body>
</html>
