<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🌌 多元宇宙概念收集者 v0.20 - 魔法科技宇宙 22 场景完结篇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.8;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: clamp(1.5em, 5vw, 2.5em);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: clamp(0.9em, 3vw, 1.1em);
        }
        
        .scene {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .scene-title {
            font-size: clamp(1.3em, 4vw, 1.8em);
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .scene-text {
            font-size: clamp(1em, 3.5vw, 1.1em);
            margin-bottom: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .choice-btn {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 25px);
            border-radius: 10px;
            font-size: clamp(1em, 3.5vw, 1.1em);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4));
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .choice-btn:active {
            transform: scale(0.98);
        }
        
        .status-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-label {
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            color: #888;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: clamp(1.2em, 4vw, 1.5em);
            font-weight: bold;
            color: #667eea;
        }
        
        /* ============ 概念收集和成就解锁特效 ============ */
        .concept-collected {
            background: linear-gradient(135deg, rgba(67, 233, 123, 0.25), rgba(56, 249, 215, 0.25));
            border: 3px solid;
            border-image: linear-gradient(135deg, rgba(67, 233, 123, 0.8), rgba(56, 249, 215, 0.8)) 1;
            border-radius: 15px;
            padding: 25px 35px;
            text-align: center;
            margin: 20px 0;
            animation: conceptPulse 1.5s ease-in-out infinite, conceptPopIn 0.5s ease-out;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 1000;
            min-width: 320px;
            box-shadow: 
                0 0 30px rgba(67, 233, 123, 0.6),
                0 0 60px rgba(67, 233, 123, 0.3),
                inset 0 0 30px rgba(67, 233, 123, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .concept-collected.achievement {
            background: linear-gradient(135deg, rgba(240, 165, 0, 0.25), rgba(255, 196, 0, 0.25));
            border-image: linear-gradient(135deg, rgba(240, 165, 0, 0.9), rgba(255, 196, 0, 0.9)) 1;
            box-shadow: 
                0 0 30px rgba(240, 165, 0, 0.6),
                0 0 60px rgba(240, 165, 0, 0.3),
                inset 0 0 30px rgba(240, 165, 0, 0.1);
        }
        
        .concept-collected.legendary {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.25), rgba(255, 142, 83, 0.25));
            border-image: linear-gradient(135deg, rgba(255, 107, 107, 0.9), rgba(255, 142, 83, 0.9)) 1;
            box-shadow: 
                0 0 40px rgba(255, 107, 107, 0.7),
                0 0 80px rgba(255, 142, 83, 0.4),
                inset 0 0 40px rgba(255, 107, 107, 0.15);
            animation: legendaryPulse 1s ease-in-out infinite, conceptPopIn 0.6s ease-out;
        }
        
        .concept-collected.epic {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.25), rgba(142, 68, 173, 0.25));
            border-image: linear-gradient(135deg, rgba(155, 89, 182, 0.9), rgba(142, 68, 173, 0.9)) 1;
            box-shadow: 
                0 0 35px rgba(155, 89, 182, 0.7),
                0 0 70px rgba(142, 68, 173, 0.35),
                inset 0 0 35px rgba(155, 89, 182, 0.15);
        }
        
        .concept-collected.rare {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.25), rgba(41, 128, 185, 0.25));
            border-image: linear-gradient(135deg, rgba(52, 152, 219, 0.9), rgba(41, 128, 185, 0.9)) 1;
            box-shadow: 
                0 0 30px rgba(52, 152, 219, 0.6),
                0 0 60px rgba(41, 128, 185, 0.3),
                inset 0 0 30px rgba(52, 152, 219, 0.1);
        }
        
        @keyframes conceptPulse {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(67, 233, 123, 0.6), 0 0 60px rgba(67, 233, 123, 0.3), inset 0 0 30px rgba(67, 233, 123, 0.1);
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                box-shadow: 0 0 50px rgba(67, 233, 123, 0.9), 0 0 100px rgba(67, 233, 123, 0.5), inset 0 0 40px rgba(67, 233, 123, 0.2);
                transform: translate(-50%, -50%) scale(1.02);
            }
        }
        
        @keyframes legendaryPulse {
            0%, 100% { 
                box-shadow: 0 0 40px rgba(255, 107, 107, 0.7), 0 0 80px rgba(255, 142, 83, 0.4), inset 0 0 40px rgba(255, 107, 107, 0.15);
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                box-shadow: 0 0 60px rgba(255, 107, 107, 1), 0 0 120px rgba(255, 142, 83, 0.6), inset 0 0 50px rgba(255, 107, 107, 0.25);
                transform: translate(-50%, -50%) scale(1.03);
            }
        }
        
        @keyframes conceptPopIn {
            0% { 
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(67, 233, 123, 0.5); }
            50% { box-shadow: 0 0 40px rgba(67, 233, 123, 0.8); }
        }
        
        /* 粒子容器 */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .particle.sparkle {
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #fff, transparent);
            box-shadow: 0 0 6px currentColor, 0 0 12px currentColor;
        }
        
        .particle.star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            width: 12px;
            height: 12px;
        }
        
        .particle.orb {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 30% 30%, #fff, currentColor);
            box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
        }
        
        .particle.hex {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            width: 10px;
            height: 10px;
        }
        
        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg);
            }
        }
        
        @keyframes particleBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            50% {
                opacity: 0.8;
                transform: translate(calc(var(--tx) * 0.5), calc(var(--ty) * 0.5)) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
        
        /* 闪光效果 */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3), transparent 70%);
            pointer-events: none;
            z-index: 998;
            opacity: 0;
            animation: flashEffect 0.6s ease-out;
        }
        
        @keyframes flashEffect {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* 通知文字样式 */
        .notification-title {
            font-size: 1.1em;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .notification-icon {
            font-size: 1.5em;
            animation: iconBounce 0.6s ease-out;
        }
        
        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        .concept-name {
            font-size: clamp(1.4em, 5vw, 1.8em);
            font-weight: bold;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin: 10px 0;
            animation: textShine 2s ease-in-out infinite;
        }
        
        .concept-name.legendary-text {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: legendaryShine 1.5s ease-in-out infinite;
        }
        
        .concept-name.epic-text {
            background: linear-gradient(135deg, #9b59b6, #8e44ad, #9b59b6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: epicShine 2s ease-in-out infinite;
        }
        
        .concept-name.rare-text {
            background: linear-gradient(135deg, #3498db, #2980b9, #3498db);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rareShine 2s ease-in-out infinite;
        }
        
        @keyframes textShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        @keyframes legendaryShine {
            0%, 100% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.4); }
        }
        
        @keyframes epicShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes rareShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .rarity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        .rarity-badge.普通 { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: #fff; }
        .rarity-badge.稀有 { background: linear-gradient(135deg, #3498db, #2980b9); color: #fff; box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        .rarity-badge.史诗 { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: #fff; box-shadow: 0 0 15px rgba(155, 89, 182, 0.6); }
        .rarity-badge.传说 { background: linear-gradient(135deg, #ff6b6b, #ff8e53); color: #fff; box-shadow: 0 0 20px rgba(255, 107, 107, 0.7); animation: legendaryBadgePulse 1.5s ease-in-out infinite; }
        
        @keyframes legendaryBadgePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 107, 0.7); }
            50% { box-shadow: 0 0 30px rgba(255, 107, 107, 1), 0 0 40px rgba(255, 142, 83, 0.5); }
        }
        
        .concept-name {
            font-size: clamp(1.2em, 4vw, 1.5em);
            font-weight: bold;
            color: #43e97b;
        }
        
        .hidden {
            display: none !important;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .save-system {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .save-system-title {
            font-size: clamp(1.2em, 4vw, 1.4em);
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .save-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .save-slot {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .save-slot:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-3px);
        }
        
        .save-slot.has-data {
            border-color: rgba(67, 233, 123, 0.5);
        }
        
        .save-slot.has-data:hover {
            border-color: #43e97b;
            background: rgba(67, 233, 123, 0.1);
        }
        
        .save-slot-info {
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            color: #888;
            margin-top: 8px;
        }
        
        .save-slot-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .save-btn, .load-btn, .delete-btn {
            padding: clamp(8px, 2.5vw, 10px) clamp(12px, 3vw, 16px);
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .load-btn {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a1a2e;
        }
        
        .load-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }
        
        .delete-btn {
            background: rgba(255, 100, 100, 0.3);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.5);
        }
        
        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.5);
            transform: scale(1.05);
        }
        
        .save-message {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .save-success {
            background: rgba(67, 233, 123, 0.2);
            color: #43e97b;
        }
        
        .save-error {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
        }
        
        .menu-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .menu-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: clamp(10px, 2.5vw, 12px) clamp(15px, 3vw, 20px);
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.9em, 2.5vw, 1em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .menu-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .menu-btn:active {
            transform: scale(0.98);
        }
        
        .concept-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }
        
        .concept-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        
        .concept-card.common { border-color: #4a9eff; }
        .concept-card.rare { border-color: #a335ee; }
        .concept-card.epic { border-color: #ff8000; }
        .concept-card.legendary { border-color: #ffcc00; }
        
        .concept-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;
            gap: 8px;
        }
        
        .concept-card-title {
            font-size: clamp(1.1em, 3.5vw, 1.2em);
            font-weight: bold;
            color: #667eea;
        }
        
        .rarity-badge {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: clamp(0.75em, 2.5vw, 0.8em);
            font-weight: bold;
        }
        
        .rarity-badge.common { background: #4a9eff; color: white; }
        .rarity-badge.rare { background: #a335ee; color: white; }
        .rarity-badge.epic { background: #ff8000; color: white; }
        .rarity-badge.legendary { background: #ffcc00; color: black; }
        
        .concept-card-body {
            font-size: clamp(0.9em, 3vw, 0.95em);

        }
        
        .concept-card-science {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: clamp(0.85em, 2.5vw, 0.9em);

        }
        
        .locked-concept {

        .achievement-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;

            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.3);

        .achievement-card.locked {

        .achievement-icon {
            font-size: clamp(2.5em, 6vw, 3em);

        }
        
        .achievement-name {
            font-size: clamp(1em, 3vw, 1.1em);
            font-weight: bold;
            color: #f0a500;
            margin-bottom: 5px;
        }
        
        .achievement-desc {
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            color: #888;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            font-size: clamp(0.85em, 2.5vw, 0.9em);
        }
        
        .ending-scene {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));

        }
        
        .ending-title {
            font-size: clamp(1.8em, 5vw, 2.5em);
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

        .ending-text {

            margin-bottom: 20px;
        }
        
        .stats-summary {
            background: rgba(0, 0, 0, 0.3);

        };
        
        let currentAudio = null;
        let isMusicPlaying = true;
        let currentVolume = 0.5;
        let currentTrackIndex = 0;
        const audioPool = {};
        
        function initAudio() {
            for (const [name, url] of Object.entries(soundEffects)) {
                const audio = new Audio(url);
                audio.preload = 'auto';
                audio.volume = 0.3;
                audioPool[name] = audio;
            }
            loadTrack(0);
            updateMusicStatus();
        }
        
        function loadTrack(index) {
            if (currentAudio) {
                // 淡出效果
                const fadeInterval = setInterval(() => {
                    if (currentAudio.volume > 0.05) {
                        currentAudio.volume -= 0.05;
                    } else {
                        clearInterval(fadeInterval);
                        currentAudio.pause();
                        currentAudio.currentTime = 0;
                        playTrack(index);
                    }
                }, 50);
            } else {
                playTrack(index);
            }
        }
        
        function playTrack(index) {
            const track = musicTracks[index];
            currentAudio = new Audio(track.url);
            currentAudio.loop = true;
            currentAudio.volume = isMusicPlaying ? currentVolume : 0;
            currentAudio.addEventListener('canplaythrough', () => {
                if (isMusicPlaying) {
                    currentAudio.play().catch(e => console.log('Audio autoplay blocked:', e));
                }
            });
            currentAudio.load();
            currentTrackIndex = index;
            updateMusicStatus();
        }
        
        function toggleMusic() {
            isMusicPlaying = !isMusicPlaying;
            if (currentAudio) {
                if (isMusicPlaying) {
                    currentAudio.volume = currentVolume;
                    currentAudio.play().catch(e => console.log('Audio play blocked:', e));
                } else {
                    currentAudio.volume = 0;
                }
            }
            document.getElementById('music-toggle').textContent = isMusicPlaying ? '🎵 音乐：开' : '🔇 音乐：关';
        }
        
        function setVolume(value) {
            currentVolume = value / 100;
            if (currentAudio && isMusicPlaying) {
                currentAudio.volume = currentVolume;
            }
        }
        
        function nextTrack() {
            const nextIndex = (currentTrackIndex + 1) % musicTracks.length;
            loadTrack(nextIndex);
        }
        
        function updateMusicStatus() {
            const status = document.getElementById('music-status');
            if (musicTracks[currentTrackIndex]) {
                status.textContent = `🎵 ${musicTracks[currentTrackIndex].name}`;
            }
        }
        
        function playSound(name) {
            if (audioPool[name]) {

                container.className = 'particle-container';
                document.body.appendChild(container);
            }
            return container;
        }
        
        function spawnParticles(x, y, count, color, type = 'sparkle') {
            const container = createParticleContainer();
            const types = ['sparkle', 'star', 'orb', 'hex'];
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = `particle ${type === 'mixed' ? types[Math.floor(Math.random() * types.length)] : type}`;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.color = color;
                particle.style.backgroundColor = color;
                
                // 随机方向和距离
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                const distance = 100 + Math.random() * 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                // 随机动画时长
                const duration = 0.8 + Math.random() * 0.7;
                particle.style.animation = `particleBurst ${duration}s ease-out forwards`;
                
                container.appendChild(particle);
                
                // 动画结束后移除
                setTimeout(() => particle.remove(), duration * 1000);
            }
        }

            const flash = document.createElement('div');

                        top: ${y}px;

                        height: 20px;
                        border: 3px solid ${color};
                        border-radius: 50%;
                        transform: translate(-50%, -50%);
                        pointer-events: none;

            const achievementSystem = document.getElementById('achievement-system');
            
            if (!saveSystem.classList.contains('hidden')) {

            achievementSystem.classList.add('hidden');

        function selectSlot(slot) {
            selectedSlot = slot;
            document.querySelectorAll('.save-slot').forEach(s => s.style.borderColor = 'rgba(102, 126, 234, 0.3)');
            document.getElementById(`slot-${slot}`).style.borderColor = '#667eea';
            updateSlotInfo();
        }
        
        function updateSlotInfo() {
            for (let i = 1; i <= 3; i++) {
                const saved = localStorage.getItem(SAVE_PREFIX + i);
                const info = document.getElementById(`slot-${i}-info`);
                if (saved) {
                    const data = JSON.parse(saved);
                    info.textContent = `${data.currentUniverse} | ${data.concepts.length}概念 | ${data.score}分`;
                    document.getElementById(`slot-${i}`).classList.add('has-data');
                } else {
                    info.textContent = '空';
                    document.getElementById(`slot-${i}`).classList.remove('has-data');
                }
            }
        }
        
        function saveGame() {
            gameData.timestamp = Date.now();
            gameData.currentScene = getCurrentScene();
            gameData.universesVisited = Array.from(gameData.universesVisited);
            localStorage.setItem(SAVE_PREFIX + selectedSlot, JSON.stringify(gameData));
            playSound('save');
            showMessage('存档成功！', 'success');
            updateSlotInfo();
        }
        
        function loadGame() {
            const saved = localStorage.getItem(SAVE_PREFIX + selectedSlot);
            if (!saved) {
                showMessage('该存档位为空！', 'error');
                return;
            }
            const data = JSON.parse(saved);
            Object.assign(gameData, data);
            gameData.universesVisited = new Set(data.universesVisited || []);
            renderScene(gameData.currentScene || "start");
            playSound('save');
            showMessage('读档成功！', 'success');
            toggleSaveSystem();
        }
        
        function deleteSave() {
            if (confirm('确定要删除这个存档吗？')) {

                updateSlotInfo();
            }
        }

            if (collected === 10 && !gameData.achievements.includes('collector_10')) {

            if (collected === 50 && !gameData.achievements.includes('collector_50')) {
                setTimeout(() => navigateTo("achievement_50"), 500);
                return;
            }
            
            // Check for ending conditions
            if (percentage >= 100 && !gameData.achievements.includes('ending_100')) {
                setTimeout(() => navigateTo("ending_100"), 1000);

                </div>
                <div class="concept-name ${textClass}">${conceptName}</div>
                ${rarity ? `<div class="rarity-badge ${rarity}">${rarity} +${score}分</div>` : ''}
            `;
            
            const container = document.getElementById('game-container');
            container.insertBefore(notification, container.firstChild);
            
            // 触发粒子特效
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            spawnParticles(centerX, centerY, particleCount, particleColor, 'mixed');
            
            // 传说和史诗稀有度添加闪光效果
            if (rarity === '传说' || rarity === '史诗') {
                createFlashEffect();
                createRippleEffect(centerX, centerY, particleColor);
            }
            
            // 显示时间根据稀有度调整
            const displayTime = rarity === '传说' ? 5000 : rarity === '史诗' ? 4500 : 3500;
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translate(-50%, -50%) scale(0.8)';
                notification.style.transition = 'all 0.5s ease';
                setTimeout(() => notification.remove(), 500);
            }, displayTime);
        }
        
        function updateStatus() {
            document.getElementById('universe-display').textContent = gameData.currentUniverse;
            document.getElementById('concepts-display').textContent = gameData.concepts.length;
            document.getElementById('score-display').textContent = gameData.score;
            document.getElementById('chapter-display').textContent = gameData.chapter;
        }
        
        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) {
                console.error(`Scene '${sceneId}' not found`);
                return;
            }
            
            if (scene.onEnter) {
                try {
                    scene.onEnter();
                } catch (e) {
                    console.error('Error in onEnter:', e);
                }
            }
            
            const container = document.getElementById('game-container');
            let text = typeof scene.text === 'function' ? scene.text() : scene.text;
            text = text.replace(/\${gameData\.concepts\.length}/g, gameData.concepts.length);
            
            container.innerHTML = `
                <div class="scene fade-in ${sceneId.startsWith('ending') ? 'ending-scene' : ''}">
                    <h2 class="scene-title ${sceneId.startsWith('ending') ? 'ending-title' : ''}">${scene.title}</h2>
                    <div class="scene-text ${sceneId.startsWith('ending') ? 'ending-text' : ''}">${text.replace(/\n/g, '<br>')}</div>
                    <div class="choices">
                        ${scene.choices.map((choice, index) => {
                            const conceptParam = choice.concept ? `, '${choice.concept}'` : '';
                            return `
                            <button class="choice-btn" onclick="navigateTo('${choice.next}'${conceptParam})">
                                ${choice.text}
                            </button>
                        `;
                        }).join('')}
                    </div>
                </div>
            `;
            
            updateStatus();
            updateReturnButton();
            
            const sceneElement = container.querySelector('.scene');
            if (sceneElement) {
                sceneElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        function returnToHome() {
            playSound('sceneChange');
            renderScene('start');
        }
        
        function updateReturnButton() {
            const returnBtn = document.getElementById('return-home-btn');
            if (returnBtn) {
                if (gameData.currentScene === 'start') {
                    returnBtn.classList.add('hidden');
                } else {
                    returnBtn.classList.remove('hidden');
                }
            }
        }
        
        function navigateTo(sceneId, conceptName) {
            gameData.choicesMade++;
            gameData.currentScene = sceneId;
            
            if (conceptName) {
                collectConcept(conceptName);
            }
            
            if (sceneId.startsWith('space_')) gameData.currentUniverse = "太空歌剧宇宙";
            else if (sceneId.startsWith('time_')) gameData.currentUniverse = "时间旅行宇宙";
            else if (sceneId.startsWith('cyber_')) gameData.currentUniverse = "赛博朋克宇宙";
            else if (sceneId.startsWith('bio_')) gameData.currentUniverse = "生物朋克宇宙";
            else if (sceneId.startsWith('magic_')) gameData.currentUniverse = "魔法科技宇宙";
            else if (sceneId === 'start') gameData.currentUniverse = "主宇宙";
            
            renderScene(sceneId);
            checkAchievements();
        }
        
        // ============ 游戏初始化 ============
        window.addEventListener('DOMContentLoaded', () => {
            initAudio();
            
            let hasSaves = false;
            for (let i = 1; i <= 3; i++) {
                if (localStorage.getItem(SAVE_PREFIX + i)) {
                    hasSaves = true;
                    break;
                }
            }
            
            if (hasSaves) {
                const container = document.getElementById('game-container');
                container.innerHTML = `
                    <div class="scene fade-in">
                        <h2 class="scene-title">🎮 欢迎回来，收集者！</h2>
                        <div class="scene-text">
                            检测到你有保存的游戏进度。
                            <br><br>
                            你可以：
                        </div>
                        <div class="choices">
                            <button class="choice-btn" onclick="toggleSaveSystem(); selectSlot(1); loadGame()">
                                📂 读取存档
                            </button>
                            <button class="choice-btn" onclick="renderScene('start'); resetGameData()">
                                🔄 开始新游戏
                            </button>
                            <button class="choice-btn" onclick="toggleConcepts()">
                                📦 查看概念图鉴
                            </button>
                            <button class="choice-btn" onclick="toggleAchievements()">
                                🏆 查看成就
                            </button>
                        </div>
                    </div>
                `;
            } else {
                renderScene("start");
            }
            
            updateStatus();
            selectSlot(1);
        });
        
        function resetGameData() {
            gameData.concepts = [];
            gameData.currentUniverse = "主宇宙";
            gameData.chapter = 1;
            gameData.score = 0;
            gameData.choicesMade = 0;
            gameData.achievements = [];
            gameData.playTime = 0;
            gameData.universesVisited = new Set();
            updateStatus();
        }
    </script>
</body>
</html>
