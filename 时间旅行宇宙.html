<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>⏳ 时间旅行宇宙 - 多元宇宙概念收集者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0f0f1f 0%, #1a1a2e 50%, #2e1a4e 100%); color: #e0e0e0; line-height: 1.8; min-height: 100vh; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        h1 { font-size: clamp(1.5em, 5vw, 2.5em); margin-bottom: 10px; background: linear-gradient(135deg, #00d4ff, #ff0066); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-bar { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .status-item { font-size: 0.95em; }
        .scene { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,212,255,0.2); }
        .scene-title { font-size: clamp(1.3em, 4vw, 1.8em); margin-bottom: 15px; color: #00d4ff; }
        .scene-text { font-size: clamp(1em, 3.5vw, 1.1em); margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(255,0,102,0.2)); border: 2px solid rgba(0,212,255,0.5); color: #e0e0e0; padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 25px); border-radius: 10px; font-size: clamp(1em, 3.5vw, 1.1em); cursor: pointer; transition: all 0.3s; text-align: left; min-height: 44px; }
        .choice-btn:hover { background: rgba(0,212,255,0.3); transform: translateX(5px); }
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
        .nav-btn:hover { background: rgba(0,212,255,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⏳ 时间旅行宇宙</h1>
            <div class="status-bar">
                <div class="status-item">📦 概念：<span id="concept-count">0</span>/20</div>
                <div class="status-item">⭐ 得分：<span id="score">0</span></div>
                <div class="status-item">🏆 成就：<span id="achievement-count">0</span></div>
            </div>
        </header>
        <div id="game-container"></div>
    </div>
    <div class="nav-bar">
        <a href="宇宙入口.html" class="nav-btn">🏠 返回入口</a>
        <a href="赛博朋克宇宙.html" class="nav-btn">🌃 赛博朋克</a>
        <a href="太空歌剧宇宙.html" class="nav-btn">🚀 太空歌剧</a>
        <a href="生物朋克宇宙.html" class="nav-btn">🧬 生物朋克</a>
        <a href="魔法科技宇宙.html" class="nav-btn">✨ 魔法科技</a>
    </div>
    <script>
        const gameData = { concepts: [], score: 0, achievements: [] };
        const scenes = {
            "time_intro": {
                title: "⏳ 时间旅行宇宙 - 时间管理局",
                text: `你穿过光门，发现自己站在一个充满未来感的大厅中。

墙壁上流动着蓝色的光带，仿佛时间本身在这里具现化。空气中弥漫着一种奇异的静电感，让你汗毛直立。

一个身着银色制服的男子向你走来，他手腕上的装置显示着不断变化的数字：2026-03-21 19:30:42...21:15:33...1945-08-06 08:15:00...

"欢迎来到时间管理局，收集者。我是时间特工 K。"他的声音似乎从多个时间点同时传来。

"在这个宇宙中，时间不是线性的，而是一张复杂的网。每一个选择都会创造新的分支，每一个行动都可能引发蝴蝶效应。"

他指向三个方向，每个方向都通向时间管理局的不同部门：`,
                choices: [
                    { text: "🕰️ 参观时间机器展厅", next: "time_machine_hall" },
                    { text: "📜 查阅时间线档案", next: "time_archives" },
                    { text: "🔮 体验时间预览室", next: "time_future_preview" }
                ]
            },
            "time_machine_hall": {
                title: "🕰️ 时间机器展厅 - 穿越时空的钥匙",
                text: `你走进一座宏伟的展厅，中央陈列着各种时间机器原型。

第一台是威尔斯式的球形装置，黄铜和玻璃构成，散发着维多利亚时代的蒸汽朋克美学。

旁边是一台现代的量子时间舱，流线型设计，表面覆盖着超导材料。

"时间旅行的关键在于闭合类时曲线。"讲解员说，"通过创造时空环路，你可以回到过去，但必须遵守自洽性原则。"`,
                choices: [
                    { text: "📖 学习时间机器原理", next: "time_machine_study", concept: "时间机器" },
                    { text: "🔙 返回时间管理局", next: "time_intro" }
                ]
            },
            "time_machine_study": {
                title: "📖 时间机器原理",
                text: `你深入研究时间旅行的理论基础。

爱因斯坦的广义相对论允许闭合类时曲线的存在。虫洞、旋转黑洞、宇宙弦——这些都是潜在的时间机器。

"但祖父悖论怎么办？"你问道。

"多世界诠释。"讲解员回答，"当你回到过去并改变历史，你创造了一个新的平行宇宙，而不是改变原来的时间线。"`,
                choices: [
                    { text: "🔙 返回展厅", next: "time_machine_hall" }
                ]
            },
            "time_archives": {
                title: "📜 时间线档案室 - 历史的记录",
                text: `你走进一座无尽的图书馆，书架一直延伸到视野尽头。

每一本书都记录着一个时间线的历史。有些书架上落满灰尘——那是已经消亡的时间线。有些则散发着光芒——那是活跃的时间线。

"这里是所有可能性的记录。"档案管理员说，"主时间线、分支时间线、废弃时间线...超过 10 的 23 次方种可能。"

她递给你一本发光的书："这是你原本的时间线。"`,
                choices: [
                    { text: "📚 阅读时间线历史", next: "time_archives_read", concept: "平行宇宙" },
                    { text: "🔙 返回时间管理局", next: "time_intro" }
                ]
            },
            "time_archives_read": {
                title: "📚 时间线历史",
                text: `你翻开那本发光的书，看到了自己的一生。

出生、成长、学习、工作...每一个选择都被详细记录。

但有些页面是空白的——那是尚未做出的选择。有些页面闪烁着——那是即将发生的未来。

"时间不是固定的。"档案管理员说，"每一刻都在创造新的可能性。"`,
                choices: [
                    { text: "🔙 返回档案室", next: "time_archives" }
                ]
            },
            "time_future_preview": {
                title: "🔮 时间预览室 - 窥视未来",
                text: `你走进一个圆形房间，墙壁上是巨大的屏幕，显示着各种可能的未来。

屏幕 A：2050 年，人类实现了可控核聚变，能源危机解除。
屏幕 B：2075 年，人工智能超越人类，进入后人类时代。
屏幕 C：2100 年，火星殖民地建立，人类成为多行星物种。
屏幕 D：2150 年，第一次接触外星文明...

"这些都是可能的未来。"时间特工说，"概率从 0.01% 到 99.9% 不等。"`,
                choices: [
                    { text: "👁️ 深入观测未来", next: "time_future_deep", concept: "时间线分支" },
                    { text: "🔙 返回时间管理局", next: "time_intro" }
                ]
            },
            "time_future_deep": {
                title: "👁️ 深入观测未来",
                text: `你聚焦于一个特定的未来：2080 年的地球。

城市漂浮在空中，交通工具是反重力飞行器。人类与 AI 和谐共处，基因改造已成为常态。

但你也看到了阴影：资源战争、AI 叛乱、外星威胁...

"未来不是注定的。"时间特工说，"每一个当下的选择都在塑造未来。"

屏幕闪烁，显示出一行字："你现在的选择将影响未来概率分布。"`,
                choices: [
                    { text: "🔙 返回预览室", next: "time_future_preview" }
                ]
            }
        };
        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) { document.getElementById('game-container').innerHTML = '<div class="scene"><h2 class="scene-title">❌ 场景不存在</h2><div class="choices"><button class="choice-btn" onclick="renderScene(\'time_intro\')">🔙 返回入口</button></div></div>'; return; }
            let choicesHtml = scene.choices.map(choice => { const concept = choice.concept ? `, "${choice.concept}"` : ''; return `<button class="choice-btn" onclick="navigateTo('${choice.next}'${concept})">${choice.text}</button>`; }).join('');
            document.getElementById('game-container').innerHTML = '<div class="scene fade-in"><h2 class="scene-title">' + scene.title + '</h2><div class="scene-text">' + scene.text + '</div><div class="choices">' + choicesHtml + '</div></div>';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function navigateTo(sceneId, conceptName) {
            if (conceptName && !gameData.concepts.includes(conceptName)) { gameData.concepts.push(conceptName); gameData.score += 10; alert('📦 获得新概念：' + conceptName + ' (+10 分)'); updateStatus(); }
            renderScene(sceneId);
        }
        function updateStatus() { document.getElementById('concept-count').textContent = gameData.concepts.length; document.getElementById('score').textContent = gameData.score; document.getElementById('achievement-count').textContent = gameData.achievements.length; }
        renderScene('time_intro');
    </script>
</body>
</html>
