<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🌌 多元宇宙概念收集者 v0.11 - 音乐深度修复</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.8;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: clamp(1.5em, 5vw, 2.5em);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: clamp(0.9em, 3vw, 1.1em);
        }
        
        .scene {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .scene-title {
            font-size: clamp(1.3em, 4vw, 1.8em);
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .scene-text {
            font-size: clamp(1em, 3.5vw, 1.1em);
            margin-bottom: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .choice-btn {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 25px);
            border-radius: 10px;
            font-size: clamp(1em, 3.5vw, 1.1em);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4));
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .choice-btn:active {
            transform: scale(0.98);
        }
        
        .status-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-label {
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            color: #888;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: clamp(1.2em, 4vw, 1.5em);
            font-weight: bold;
            color: #667eea;
        }
        
        .concept-collected {
            background: linear-gradient(135deg, rgba(67, 233, 123, 0.2), rgba(56, 249, 215, 0.2));
            border: 2px solid rgba(67, 233, 123, 0.5);
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            margin: 20px 0;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(67, 233, 123, 0.5); }
            50% { box-shadow: 0 0 40px rgba(67, 233, 123, 0.8); }
        }
        
        .concept-name {
            font-size: clamp(1.2em, 4vw, 1.5em);
            font-weight: bold;
            color: #43e97b;
        }
        
        .hidden {
            display: none !important;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .save-system {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .save-system-title {
            font-size: clamp(1.2em, 4vw, 1.4em);
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .save-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .save-slot {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .save-slot:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-3px);
        }
        
        .save-slot.has-data {
            border-color: rgba(67, 233, 123, 0.5);
        }
        
        .save-slot.has-data:hover {
            border-color: #43e97b;
            background: rgba(67, 233, 123, 0.1);
        }
        
        .save-slot-info {
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            color: #888;
            margin-top: 8px;
        }
        
        .save-slot-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .save-btn, .load-btn, .delete-btn {
            padding: clamp(8px, 2.5vw, 10px) clamp(12px, 3vw, 16px);
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .load-btn {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a1a2e;
        }
        
        .load-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }
        
        .delete-btn {
            background: rgba(255, 100, 100, 0.3);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.5);
        }
        
        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.5);
            transform: scale(1.05);
        }
        
        .save-message {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .save-success {
            background: rgba(67, 233, 123, 0.2);
            color: #43e97b;
        }
        
        .save-error {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
        }
        
        /* 全局导航栏 */
        .global-nav {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 2px solid rgba(102, 126, 234, 0.5);
        }
        
        .nav-btn-home {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 2px solid rgba(102, 126, 234, 0.8);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .nav-btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .nav-btn-home:active {
            transform: scale(0.98);
        }
        
        .universe-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .universe-label {
            font-size: 0.95em;
            color: #e0e0e0;
            font-weight: bold;
        }
        
        .universe-dropdown {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            min-height: 44px;
            min-width: 180px;
            touch-action: manipulation;
            outline: none;
        }
        
        .universe-dropdown:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }
        
        .universe-dropdown option {
            background: #1a1a2e;
            color: #e0e0e0;
        }
        
        .menu-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .menu-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: clamp(10px, 2.5vw, 12px) clamp(15px, 3vw, 20px);
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.9em, 2.5vw, 1em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .menu-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .menu-btn:active {
            transform: scale(0.98);
        }
        
        .concept-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }
        
        .concept-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        
        .concept-card.common { border-color: #4a9eff; }
        .concept-card.rare { border-color: #a335ee; }
        .concept-card.epic { border-color: #ff8000; }
        .concept-card.legendary { border-color: #ffcc00; }
        
        .concept-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .concept-card-title {
            font-size: clamp(1.1em, 3.5vw, 1.2em);
            font-weight: bold;
            color: #667eea;
        }
        
        .rarity-badge {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: clamp(0.75em, 2.5vw, 0.8em);
            font-weight: bold;
        }
        
        .rarity-badge.common { background: #4a9eff; color: white; }
        .rarity-badge.rare { background: #a335ee; color: white; }
        .rarity-badge.epic { background: #ff8000; color: white; }
        .rarity-badge.legendary { background: #ffcc00; color: black; }
        
        .concept-card-body {
            font-size: clamp(0.9em, 3vw, 0.95em);
            color: #ccc;
        }
        
        .concept-card-science {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            color: #888;
        }
        
        .locked-concept {
            opacity: 0.5;
            filter: blur(2px);
            pointer-events: none;
        }
        
        .achievement-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
            min-width: 200px;
        }
        
        .achievement-card.unlocked {
            border-color: #f0a500;
            background: rgba(240, 165, 0, 0.1);
        }
        
        .achievement-card.locked {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        
        .achievement-icon {
            font-size: clamp(2.5em, 6vw, 3em);
            margin-bottom: 10px;
        }
        
        .achievement-name {
            font-size: clamp(1em, 3vw, 1.1em);
            font-weight: bold;
            color: #f0a500;
            margin-bottom: 5px;
        }
        
        .achievement-desc {
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            color: #888;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            font-size: clamp(0.85em, 2.5vw, 0.9em);
        }
        
        /* 结局样式 */
        .ending-scene {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 3px solid #667eea;
        }
        
        .ending-title {
            font-size: clamp(1.8em, 5vw, 2.5em);
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }
        
        .ending-text {
            font-size: clamp(1.1em, 3.5vw, 1.2em);
            line-height: 2;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stats-summary {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        
        /* 🎵 音乐控制面板 - v0.11 增强版 */
        .music-controls {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        
        .music-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 2px solid rgba(102, 126, 234, 0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            min-height: 48px;
            min-width: 48px;
            touch-action: manipulation;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .music-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
        
        .music-btn:active {
            transform: scale(0.95);
        }
        
        .music-btn.enabled {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            border-color: #43e97b;
            color: #1a1a2e;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 150px;
        }
        
        .volume-slider {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
        }
        
        .volume-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }
        
        .music-status {
            font-size: 0.95em;
            color: #888;
            min-width: 100px;
            text-align: center;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .music-status.ready {
            color: #43e97b;
            background: rgba(67, 233, 123, 0.2);
        }
        
        .music-status.error {
            color: #ff6464;
            background: rgba(255, 100, 100, 0.2);
        }
        
        .music-status.loading {
            color: #f0a500;
            background: rgba(240, 165, 0, 0.2);
        }
        
        /* 用户交互提示 */
        .music-enable-prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95), rgba(118, 75, 162, 0.95));
            border: 3px solid #667eea;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 10px 60px rgba(102, 126, 234, 0.6);
            animation: promptPulse 2s ease-in-out infinite;
        }
        
        @keyframes promptPulse {
            0%, 100% { box-shadow: 0 10px 60px rgba(102, 126, 234, 0.6); }
            50% { box-shadow: 0 10px 80px rgba(102, 126, 234, 0.9); }
        }
        
        .music-enable-prompt h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: white;
        }
        
        .music-enable-prompt p {
            color: #e0e0e0;
            margin-bottom: 20px;
            font-size: 1em;
        }
        
        .music-enable-btn {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            border: none;
            color: #1a1a2e;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(67, 233, 123, 0.4);
        }
        
        .music-enable-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(67, 233, 123, 0.6);
        }
        
        /* 横屏优化 */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            .container {
                padding: 15px;
            }
            
            .scene {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .status-bar {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        /* 小屏幕优化 */
        @media screen and (max-width: 480px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 15px;
                border-radius: 15px;
            }
            
            .global-nav {
                flex-direction: column;
                align-items: stretch;
            }
            
            .nav-btn-home {
                width: 100%;
            }
            
            .universe-selector {
                flex-direction: column;
                align-items: stretch;
            }
            
            .universe-dropdown {
                width: 100%;
                min-width: auto;
            }
            
            .menu-bar {
                gap: 8px;
            }
            
            .menu-btn {
                flex: 1 1 calc(50% - 8px);
                text-align: center;
            }
            
            .status-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .save-slots {
                grid-template-columns: 1fr;
            }
            
            .music-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .music-btn {
                width: 100%;
            }
            
            .volume-control {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌌 多元宇宙概念收集者</h1>
            <div class="subtitle">v0.11 - 音乐深度修复 | 多 CDN 源 | Web Audio 合成</div>
        </header>
        
        <!-- 🎵 音乐控制面板 - v0.11 增强版 -->
        <div class="music-controls">
            <button class="music-btn" id="music-toggle" onclick="toggleMusic()">🎵 点击启用音乐</button>
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" onchange="setVolume(this.value)">
            </div>
            <button class="music-btn" onclick="nextTrack()">⏭️ 下一首</button>
            <div class="music-status loading" id="music-status">🎵 等待启用...</div>
        </div>

    <!-- 🎵 用户交互提示弹窗 -->
    <div class="music-enable-prompt hidden" id="music-prompt">
        <h3>🎵 启用背景音乐</h3>

        <button class="music-enable-btn" onclick="enableMusic()">🎵 启用音乐</button>

    <script>
        // 🎮 v0.11 - 音乐深度修复版本
        const GAME_VERSION = '0.11';
        console.log('🌌 多元宇宙概念收集者 v' + GAME_VERSION + ' 启动');
        console.log('📅 加载时间:', new Date().toISOString());
        
        // ============ 🎵 音乐系统（v0.11 深度修复版） ============
        // 多 CDN 源配置
        const musicSources = {
            pixabay: [
                { name: "赛博朋克", url: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c80a92896f.mp3?filename=cyberpunk-city-112247.mp3" },
                { name: "太空探索", url: "https://cdn.pixabay.com/download/audio/2022/03/24/audio_c617521644.mp3?filename=space-atmosphere-112896.mp3" },
                { name: "神秘魔法", url: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69c2.mp3?filename=fantasy-magic-110295.mp3" },
                { name: "未来科技", url: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_6389620a5d.mp3?filename=futuristic-technology-112467.mp3" },
                { name: "生命科学", url: "https://cdn.pixabay.com/download/audio/2021/11/25/audio_0f9a9f5b62.mp3?filename=ambient-science-109384.mp3" }
            ]
        };
        
        const musicTracks = musicSources.pixabay.map((track, i) => ({
            ...track,
            universe: ["赛博朋克", "太空歌剧", "魔法科技", "主宇宙", "生物朋克"][i]
        }));
        
        const soundEffects = {
            collect: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_06d5c5c8f7.mp3?filename=success-1-112247.mp3",
            achievement: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_7f4f10f7a6.mp3?filename=achievement-1-112248.mp3",
            legendary: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c9f11e8d3.mp3?filename=epic-fanfare-112470.mp3",
            sceneChange: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_9a2f10e8b5.mp3?filename=transition-1-112249.mp3",
            save: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_8b3f10d9c4.mp3?filename=save-1-112250.mp3"
        };
        
        let currentAudio = null;
        let isMusicPlaying = false; // v0.11: 默认关闭，等待用户启用
        let isMusicEnabled = false; // v0.11: 用户是否已启用音乐
        let currentVolume = 0.5;
        let currentTrackIndex = 0;
        let musicLoaded = false;
        let musicLoadAttempts = 0;
        const MAX_LOAD_ATTEMPTS = 3;
        const LOAD_TIMEOUT = 5000; // 5 秒超时
        
        // 音效音频池
        const audioPool = {};
        
        // 🎵 Web Audio API 上下文（用于合成音效）
        let audioContext = null;
        
        // 🎵 音乐加载状态指示器 v0.11
        function updateMusicStatus(status, message = '') {
            const statusEl = document.getElementById('music-status');
            if (statusEl) {
                statusEl.className = 'music-status ' + status;
                if (status === 'loading') {
                    statusEl.textContent = '🎵 加载中...';
                } else if (status === 'error') {
                    statusEl.textContent = message || '⚠️ 音乐加载失败';
                } else if (status === 'ready') {
                    statusEl.textContent = `🎵 ${musicTracks[currentTrackIndex].name}`;
                } else if (status === 'waiting') {
                    statusEl.textContent = '🎵 等待启用';
                } else if (status === 'synth') {
                    statusEl.textContent = '🎹 合成音效模式';
                    statusEl.className = 'music-status ready';
                } else {
                    statusEl.textContent = `🎵 ${musicTracks[currentTrackIndex].name}`;
                }
            }
        }
        
        // 🎵 初始化 Web Audio API
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                console.log('🎵 Web Audio API 初始化成功');
            }
            return audioContext;
        }
        
        // 🎵 合成音效（无需外部文件）v0.11
        function playSynthSound(type) {
            try {
                const ctx = initAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                const now = ctx.currentTime;
                
                switch (type) {
                    case 'collect':
                        oscillator.frequency.setValueAtTime(523.25, now);
                        oscillator.frequency.setValueAtTime(659.25, now + 0.1);
                        oscillator.frequency.setValueAtTime(783.99, now + 0.2);
                        gainNode.gain.setValueAtTime(0.3, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        oscillator.start(now);
                        oscillator.stop(now + 0.3);
                        break;
                    case 'achievement':
                        oscillator.type = 'triangle';
                        oscillator.frequency.setValueAtTime(523.25, now);
                        oscillator.frequency.setValueAtTime(659.25, now + 0.15);
                        oscillator.frequency.setValueAtTime(783.99, now + 0.3);
                        oscillator.frequency.setValueAtTime(1046.50, now + 0.45);
                        gainNode.gain.setValueAtTime(0.3, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                        oscillator.start(now);
                        oscillator.stop(now + 0.6);
                        break;
                    case 'legendary':
                        oscillator.type = 'square';
                        [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.2, now + i * 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
                            osc.start(now + i * 0.15);
                            osc.stop(now + i * 0.15 + 0.4);
                        });
                        return;
                    case 'sceneChange':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(220, now);
                        oscillator.frequency.exponentialRampToValueAtTime(880, now + 0.3);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        oscillator.start(now);
                        oscillator.stop(now + 0.5);
                        break;
                    case 'save':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(440, now);
                        oscillator.frequency.setValueAtTime(554.37, now + 0.1);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        oscillator.start(now);
                        oscillator.stop(now + 0.2);
                        break;
                    case 'error':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(150, now);
                        oscillator.frequency.linearRampToValueAtTime(100, now + 0.2);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        oscillator.start(now);
                        oscillator.stop(now + 0.3);
                        break;
                }
            } catch (e) {
                console.warn('⚠️ 合成音效失败:', e);
            }
        }
        
        // 🎵 带超时的音频加载 v0.11
        function loadAudioWithTimeout(url, timeout = LOAD_TIMEOUT) {
            return new Promise((resolve, reject) => {
                const audio = new Audio();
                audio.preload = 'auto';
                
                let loaded = false;
                let timedOut = false;
                
                const timeoutId = setTimeout(() => {
                    timedOut = true;
                    if (!loaded) {
                        reject(new Error('加载超时'));
                    }
                }, timeout);
                
                audio.addEventListener('canplaythrough', () => {
                    if (!timedOut) {
                        loaded = true;
                        clearTimeout(timeoutId);
                        resolve(audio);
                    }
                }, { once: true });
                
                audio.addEventListener('error', (e) => {
                    if (!timedOut) {
                        clearTimeout(timeoutId);
                        reject(new Error('音频加载失败'));
                    }
                }, { once: true });
                
                audio.src = url;
                audio.load();
            });
        }
        
        // 🎵 用户启用音乐 v0.11
        function enableMusic() {
            console.log('🎵 用户启用音乐');
            document.getElementById('music-prompt').classList.add('hidden');
            document.getElementById('music-toggle').classList.add('enabled');
            document.getElementById('music-toggle').textContent = '🎵 音乐：开';
            
            isMusicEnabled = true;
            isMusicPlaying = true;
            
            // 初始化 Web Audio API
            initAudioContext();
            
            // 加载第一首音轨
            updateMusicStatus('loading');
            loadTrackWithFallback(0);
        }
        
        // 🎵 带 fallback 的音轨加载 v0.11
        async function loadTrackWithFallback(index) {
            const track = musicTracks[index];
            console.log(`🎵 加载音轨：${track.name}`);
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            try {
                const audio = await loadAudioWithTimeout(track.url);
                currentAudio = audio;
                currentAudio.loop = true;
                currentAudio.volume = isMusicPlaying ? currentVolume : 0;
                
                musicLoaded = true;
                musicLoadAttempts = 0;
                updateMusicStatus('ready');
                
                if (isMusicPlaying) {
                    await currentAudio.play();
                    console.log('🎵 音乐播放开始');
                }
            } catch (e) {
                console.warn(`⚠️ 音乐加载失败：${track.name}`, e);
                musicLoadAttempts++;
                
                if (musicLoadAttempts < MAX_LOAD_ATTEMPTS) {
                    console.log(`🎵 重试加载 (${musicLoadAttempts}/${MAX_LOAD_ATTEMPTS})...`);
                    setTimeout(() => loadTrackWithFallback(index), 2000);
                } else {
                    // 降级为合成音效模式
                    updateMusicStatus('synth');
                    console.log('🎹 降级为合成音效模式');
                    playSynthSound('sceneChange');
                }
            }
            
            currentTrackIndex = index;
        }
        
        function initAudio() {
            console.log('🎵 初始化音频系统 v0.11...');
            
            // 预加载音效（带错误处理）
            Object.entries(soundEffects).forEach(([name, url]) => {
                const audio = new Audio(url);
                audio.preload = 'auto';
                audio.volume = 0.3;
                audio.addEventListener('canplaythrough', () => {
                    console.log(`✅ 音效加载成功：${name}`);
                });
                audio.addEventListener('error', (e) => {
                    console.warn(`⚠️ 音效加载失败：${name}，将使用合成音效`);
                });
                audioPool[name] = audio;
            });
            
            // v0.11: 显示启用提示，等待用户交互
            updateMusicStatus('waiting');
            document.getElementById('music-prompt').classList.remove('hidden');
        }
        
        function loadTrack(index) {
            if (!isMusicEnabled) {
                // 用户还未启用音乐，显示提示
                document.getElementById('music-prompt').classList.remove('hidden');
                return;
            }
            loadTrackWithFallback(index);
        }
        
        function toggleMusic() {
            if (!isMusicEnabled) {
                enableMusic();
                return;
            }
            
            isMusicPlaying = !isMusicPlaying;
            if (currentAudio) {
                if (isMusicPlaying) {
                    currentAudio.volume = currentVolume;
                    currentAudio.play()
                        .then(() => console.log('🎵 音乐已恢复'))
                        .catch(e => console.warn('⚠️ 音乐播放失败:', e));
                } else {
                    currentAudio.volume = 0;
                    currentAudio.pause();
                }
            }
            const btn = document.getElementById('music-toggle');
            btn.textContent = isMusicPlaying ? '🎵 音乐：开' : '🔇 音乐：关';
            btn.classList.toggle('enabled', isMusicPlaying);
        }
        
        function setVolume(value) {
            currentVolume = value / 100;
            if (currentAudio && isMusicPlaying) {
                currentAudio.volume = currentVolume;
            }
        }
        
        function nextTrack() {
            if (!isMusicEnabled) {
                enableMusic();
                return;
            }
            const nextIndex = (currentTrackIndex + 1) % musicTracks.length;
            loadTrack(nextIndex);
        }
        
        // 🎵 增强版音效播放（带合成 fallback）v0.11
        function playSound(name) {
            // 尝试播放预加载的音效
            if (audioPool[name]) {
                const sound = audioPool[name].cloneNode();
                sound.volume = 0.3;
                sound.play()
                    .then(() => console.log(`🔊 音效播放：${name}`))
                    .catch(e => {
                        console.warn(`⚠️ 音效播放失败，使用合成：${name}`);
                        playSynthSound(name);
                    });
            } else {
                // 直接使用合成音效
                playSynthSound(name);
            }
        }
        
        // ============ ✨ 粒子特效系统（v0.10 新增） ============
        const particleCanvas = document.createElement('canvas');
        particleCanvas.id = 'particle-canvas';
        particleCanvas.style.position = 'fixed';
        particleCanvas.style.top = '50%';
        particleCanvas.style.left = '50%';
        particleCanvas.style.transform = 'translate(-50%, -50%)';
        particleCanvas.style.zIndex = '9999';
        particleCanvas.style.width = '100%';
        particleCanvas.style.height = '100%';
        particleCanvas.style.pointerEvents = 'none';
        particleCanvas.style.zIndex = '9999';
        
        let particles = [];
        let particleAnimationId = null;
        
        function initParticleEffect() {
            document.body.appendChild(particleCanvas);
            resizeParticleCanvas();
            window.addEventListener('resize', resizeParticleCanvas);
        }
        
        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        
        function createParticle(x, y, color, type = 'sparkle') {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 3 + 2;
            return {
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1,
                decay: Math.random() * 0.02 + 0.01,
                color: color,
                size: Math.random() * 4 + 2,
                type: type
            };
        }
        
        function spawnParticles(x, y, count, color, type = 'sparkle') {
            for (let i = 0; i < count; i++) {
                particles.push(createParticle(x, y, color, type));
            }
            if (!particleAnimationId) {
                updateParticles();
            }
        }
        
        function updateParticles() {
            const ctx = particleCanvas.getContext('2d');
            ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // 重力
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                
                // 闪光效果
                if (p.type === 'sparkle' && p.life > 0.5) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fill();
                }
            }
            
            ctx.globalAlpha = 1;
            
            if (particles.length > 0) {
                particleAnimationId = requestAnimationFrame(updateParticles);
            } else {
                particleAnimationId = null;
            }
        }
        
        // 🎉 收集特效
        function showCollectEffect(x, y, rarity = 'common') {
            const colors = {
                common: '#4a9eff',
                rare: '#a335ee',
                epic: '#ff8000',
                legendary: '#ffcc00'
            };
            const color = colors[rarity] || colors.common;
            
            // 粒子爆发
            spawnParticles(x, y, 30, color, 'sparkle');
            
            // 闪光效果
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.left = x + 'px';
            flash.style.top = y + 'px';
            flash.style.transform = 'translate(-50%, -50%)';
            flash.style.width = '100px';
            flash.style.height = '100px';
            flash.style.borderRadius = '50%';
            flash.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
            flash.style.animation = 'flashExpand 0.5s ease-out forwards';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9998';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 500);
        }
        
        // 🏆 成就解锁特效
        function showAchievementEffect(x, y) {
            // 金色粒子
            spawnParticles(x, y, 50, '#f0a500', 'sparkle');
            spawnParticles(x, y, 30, '#ffd700', 'sparkle');
            
            // 星光闪烁
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const starX = x + (Math.random() - 0.5) * 200;
                    const starY = y + (Math.random() - 0.5) * 100;
                    spawnParticles(starX, starY, 10, '#ffffff', 'sparkle');
                }, i * 100);
            }
        }
        
        // 添加 CSS 动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes flashExpand {
                0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
            }
            @keyframes medalPop {
                0% { transform: scale(0) rotate(-180deg); opacity: 0; }
                50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
                100% { transform: scale(1) rotate(0deg); opacity: 1; }
            }
            @keyframes starPulse {
                0%, 100% { box-shadow: 0 0 20px rgba(240, 165, 0, 0.5); }

        // ============ 音乐切换函数 ============
        function switchMusic(trackIndex) {
            if (!isMusicPlaying) return;
            if (trackIndex !== currentTrackIndex) {
                loadTrack(trackIndex);
            }
        }
        
        // ============ 存档系统函数 ============
        function toggleSaveSystem() {
            playSound('save');
            // 切换功能：如果已打开则关闭
            if (menuState.saveOpen) {
                document.getElementById('save-system').classList.add('hidden');
                menuState.saveOpen = false;
                return;
            }
            
            // 关闭其他菜单
            document.getElementById('concept-gallery').classList.add('hidden');
            document.getElementById('achievement-system').classList.add('hidden');
            menuState.conceptOpen = false;
            menuState.achievementOpen = false;
            
            document.getElementById('save-system').classList.remove('hidden');
            menuState.saveOpen = true;
        }
        
        function selectSlot(slot) {
            selectedSlot = slot;
            document.querySelectorAll('.save-slot').forEach(s => s.style.borderColor = 'rgba(102, 126, 234, 0.3)');
            document.getElementById(`slot-${slot}`).style.borderColor = '#667eea';
            updateSlotInfo();
        }
        
        function updateSlotInfo() {
            for (let i = 1; i <= 3; i++) {
                const saved = localStorage.getItem(SAVE_PREFIX + i);
                const info = document.getElementById(`slot-${i}-info`);
                if (saved) {
                    const data = JSON.parse(saved);
                    info.textContent = `${data.currentUniverse} | ${data.concepts.length}概念 | ${data.score}分`;
                    document.getElementById(`slot-${i}`).classList.add('has-data');
                } else {
                    info.textContent = '空';
                    document.getElementById(`slot-${i}`).classList.remove('has-data');
                }
            }
        }
        
        function saveGame() {
            gameData.timestamp = Date.now();
            gameData.currentScene = getCurrentScene();
            gameData.universesVisited = Array.from(gameData.universesVisited);
            localStorage.setItem(SAVE_PREFIX + selectedSlot, JSON.stringify(gameData));
            playSound('save');
            showMessage('存档成功！', 'success');
            updateSlotInfo();
        }
        
        function loadGame() {
            const saved = localStorage.getItem(SAVE_PREFIX + selectedSlot);
            if (!saved) {
                showMessage('该存档位为空！', 'error');
                return;
            }
            const data = JSON.parse(saved);
            Object.assign(gameData, data);
            gameData.universesVisited = new Set(data.universesVisited || []);
            renderScene(gameData.currentScene || "start");
            updateUniverseSelector(gameData.currentScene || "start");
            playSound('save');
            showMessage('读档成功！', 'success');
            toggleSaveSystem();
        }
        
        function deleteSave() {
            if (confirm('确定要删除这个存档吗？')) {
                localStorage.removeItem(SAVE_PREFIX + selectedSlot);
                showMessage('存档已删除！', 'success');
                updateSlotInfo();
            }
        }
        
        function showMessage(msg, type) {
            const el = document.getElementById('save-message');
            el.textContent = msg;
            el.className = 'save-message ' + (type === 'success' ? 'save-success' : 'save-error');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 2000);
        }
        
        function getCurrentScene() {
            return gameData.currentScene;
        }
        
        // ============ 菜单状态追踪 ============
        let menuState = {
            saveOpen: false,
            conceptOpen: false,
            achievementOpen: false
        };
        
        // ============ 概念图鉴函数 ============
        function showConcepts() {
            // 切换功能：如果已打开则关闭
            if (menuState.conceptOpen) {
                document.getElementById('concept-gallery').classList.add('hidden');
                menuState.conceptOpen = false;
                return;
            }
            
            // 关闭其他菜单
            document.getElementById('save-system').classList.add('hidden');
            document.getElementById('achievement-system').classList.add('hidden');
            menuState.saveOpen = false;
            menuState.achievementOpen = false;
            
            const gallery = document.getElementById('concept-gallery');
            gallery.classList.remove('hidden');
            menuState.conceptOpen = true;
            
            const total = Object.keys(conceptDatabase).length;
            const collected = gameData.concepts.length;
            document.getElementById('concept-progress').textContent = `${collected}/${total}`;
            document.getElementById('concept-progress-bar').style.width = `${(collected/total)*100}%`;
            
            const list = document.getElementById('concept-list');
            list.innerHTML = '';
            
            for (const [id, concept] of Object.entries(conceptDatabase)) {
                const isCollected = gameData.concepts.includes(concept.name);
                const card = document.createElement('div');
                card.className = `concept-card ${concept.rarity.toLowerCase()} ${isCollected ? '' : 'locked-concept'}`;
                card.innerHTML = `
                    <div class="concept-card-header">
                        <span class="concept-card-title">${isCollected ? concept.name : '🔒 未收集'}</span>
                        <span class="rarity-badge ${concept.rarity.toLowerCase()}">${concept.rarity}</span>
                    </div>
                    <div class="concept-card-body">
                        ${isCollected ? `
                            <div><strong>类别:</strong> ${concept.category}</div>
                            <div><strong>描述:</strong> ${concept.description}</div>
                            <div class="concept-card-science"><strong>科学原理:</strong> ${concept.science}</div>
                        ` : '<div style="color: #666;">探索宇宙以解锁此概念</div>'}
                    </div>
                `;
                list.appendChild(card);
            }
        }

            const system = document.getElementById('achievement-system');
            system.classList.remove('hidden');
            menuState.achievementOpen = true;

            list.innerHTML = '';
            list.style.display = 'grid';
            list.style.gridTemplateColumns = 'repeat(auto-fit, minmax(200px, 1fr))';
            list.style.gap = '15px';
            
            for (const ach of achievements) {
                const isUnlocked = gameData.achievements.includes(ach.id);
                const card = document.createElement('div');
                card.className = `achievement-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.innerHTML = `
                    <div class="achievement-icon">${ach.icon}</div>

                `;
                list.appendChild(card);
            }
        }

                newAchievements.push('cyber_explorer');
            }
            if (gameData.universesVisited.has('太空歌剧宇宙') && !gameData.achievements.includes('space_explorer')) {
                newAchievements.push('space_explorer');
            }
            if (gameData.universesVisited.has('时间旅行宇宙') && !gameData.achievements.includes('time_explorer')) {
                newAchievements.push('time_explorer');
            }
            if (gameData.universesVisited.has('生物朋克宇宙') && !gameData.achievements.includes('bio_explorer')) {
                newAchievements.push('bio_explorer');
            }
            if (gameData.universesVisited.has('魔法科技宇宙') && !gameData.achievements.includes('magic_explorer')) {
                newAchievements.push('magic_explorer');
            }
            
            // 得分成就
            if (gameData.score >= 500 && !gameData.achievements.includes('score_500')) {
                newAchievements.push('score_500');
            }
            if (gameData.score >= 1000 && !gameData.achievements.includes('score_1000')) {
                newAchievements.push('score_1000');
            }
            if (gameData.score >= 2000 && !gameData.achievements.includes('score_2000')) {
                newAchievements.push('score_2000');
            }
            
            // 决策成就
            if (gameData.choicesMade >= 100 && !gameData.achievements.includes('decision_maker')) {
                newAchievements.push('decision_maker');
            }
            
            if (newAchievements.length > 0) {
                gameData.achievements.push(...newAchievements);
                for (const achId of newAchievements) {
                    const ach = achievements.find(a => a.id === achId);
                    if (ach) showAchievementNotification(ach);
                }
                // 刷新成就 UI（如果成就系统打开）
                if (menuState.achievementOpen) {
                    showAchievements();
                }
            }
        }
        
        function showAchievementNotification(achievement) {
            playSound('achievement');
            const notification = document.createElement('div');
            notification.className = 'concept-collected fade-in medal-animation achievement-glow';
            notification.style.background = 'linear-gradient(135deg, rgba(240, 165, 0, 0.25), rgba(255, 215, 0, 0.15))';
            notification.style.borderColor = 'rgba(240, 165, 0, 0.6)';
            notification.style.boxShadow = '0 0 30px rgba(240, 165, 0, 0.5), inset 0 0 20px rgba(255, 215, 0, 0.1)';
            notification.innerHTML = `
                <div style="font-size: 2em; margin-bottom: 10px;">${achievement.icon}</div>
                <div style="font-size: 1.1em; font-weight: bold; color: #f0a500; text-shadow: 0 0 10px rgba(240, 165, 0, 0.5);">🏆 解锁成就！</div>
                <div class="concept-name" style="color: #ffd700; font-size: 1.2em;">${achievement.name}</div>
                <div style="font-size: 0.95em; color: #e0e0e0; margin-top: 8px;">${achievement.desc}</div>
            `;
            const container = document.getElementById('game-container');
            container.insertBefore(notification, container.firstChild);
            
            // 触发成就特效（在屏幕中央）
            setTimeout(() => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                showAchievementEffect(centerX, centerY);
            }, 200);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s ease';
                setTimeout(() => notification.remove(), 500);
            }, 4500);
        }
        
        function checkEnding() {
            const collected = gameData.concepts.length;
            const total = Object.keys(conceptDatabase).length;
            const percentage = (collected / total) * 100;
            
            if (percentage >= 100) {
                setTimeout(() => navigateTo("ending_100"), 1000);
            } else if (percentage >= 80) {
                setTimeout(() => navigateTo("ending_80"), 1000);
            } else if (percentage >= 50) {
                setTimeout(() => navigateTo("ending_50"), 1000);
            }
        }
        
        // ============ 全局导航功能 ============
        function goToMainUniverse() {
            console.log('[goToMainUniverse] 返回主宇宙');
            playSound('sceneChange');
            renderScene("start");
            updateUniverseSelector("start");
        }
        
        function switchUniverse(sceneId) {
            // 🔧 v0.9 调试日志
            console.log('[switchUniverse] 从下拉菜单切换宇宙:', sceneId);
            console.log('[switchUniverse] 目标场景存在:', scenes[sceneId] ? '✅' : '❌');
            
            try {
                playSound('sceneChange');
                renderScene(sceneId);
                updateUniverseSelector(sceneId);
                console.log('[switchUniverse] ✅ 切换成功');
            } catch (error) {
                console.error('[switchUniverse] ❌ 切换失败:', error);
                alert('切换宇宙失败：' + error.message);
            }
        }
        
        function updateUniverseSelector(sceneId) {
            const selector = document.getElementById('universe-select');
            if (selector) {
                selector.value = sceneId;
            }
        }
        
        function resetGame() {
            if (confirm('确定要重新开始游戏吗？当前进度将丢失（除非已保存）！')) {
                gameData.concepts = [];
                gameData.currentUniverse = "主宇宙";
                gameData.chapter = 1;
                gameData.score = 0;
                gameData.choicesMade = 0;
                gameData.achievements = [];
                gameData.playTime = 0;
                gameData.universesVisited = new Set();
                renderScene("start");
                updateStatus();
                updateUniverseSelector("start");
            }
        }
        
        function collectConcept(conceptName) {
            console.log('[collectConcept] 尝试收集:', conceptName);
            if (!gameData.concepts.includes(conceptName)) {
                gameData.concepts.push(conceptName);
                
                // 获取概念稀有度并计算得分
                const conceptData = Object.values(conceptDatabase).find(c => c.name === conceptName);
                const rarity = conceptData ? conceptData.rarity : 'common';
                
                // 根据稀有度加分：普通 10 分，稀有 20 分，史诗 30 分，传说 50 分
                const scoreRewards = {
                    '普通': 10,
                    '稀有': 20,
                    '史诗': 30,
                    '传说': 50
                };
                const scoreAdd = scoreRewards[rarity] || 10;
                gameData.score += scoreAdd;
                
                console.log('[collectConcept] ✅ 收集成功，当前概念数:', gameData.concepts.length, '得分 +', scoreAdd);
                
                // 播放音效（传说概念使用特殊音效）
                if (rarity === 'legendary') {
                    playSound('legendary');
                } else {
                    playSound('collect');
                }
                
                // 显示特效和通知
                showConceptNotification(conceptName, rarity);
                checkAchievements();
                checkEnding();
                updateStatus(); // 确保分数实时更新
            } else {
                console.log('[collectConcept] ℹ️ 概念已收集:', conceptName);
            }
        }
        
        function showConceptNotification(conceptName, rarity = 'common') {
            const notification = document.createElement('div');
            notification.className = 'concept-collected fade-in';
            
            // 根据稀有度设置样式
            const rarityStyles = {
                common: { bg: 'rgba(74, 158, 255, 0.2)', border: 'rgba(74, 158, 255, 0.5)', color: '#4a9eff', glow: '0 0 20px rgba(74, 158, 255, 0.5)' },
                rare: { bg: 'rgba(163, 53, 238, 0.2)', border: 'rgba(163, 53, 238, 0.5)', color: '#a335ee', glow: '0 0 25px rgba(163, 53, 238, 0.6)' },
                epic: { bg: 'rgba(255, 128, 0, 0.2)', border: 'rgba(255, 128, 0, 0.5)', color: '#ff8000', glow: '0 0 30px rgba(255, 128, 0, 0.7)' },
                legendary: { bg: 'rgba(255, 204, 0, 0.2)', border: 'rgba(255, 204, 0, 0.5)', color: '#ffcc00', glow: '0 0 40px rgba(255, 204, 0, 0.8)' }
            };
            
            const style = rarityStyles[rarity] || rarityStyles.common;
            notification.style.background = `linear-gradient(135deg, ${style.bg}, rgba(255, 255, 255, 0.05))`;
            notification.style.borderColor = style.border;
            notification.style.boxShadow = style.glow;
            
            const rarityText = rarity === 'common' ? '' : ` <span class="rarity-badge ${rarity}">${rarity.toUpperCase()}</span>`;
            
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                    <span>${rarity === 'legendary' ? '🌟' : rarity === 'epic' ? '✨' : rarity === 'rare' ? '💎' : '🎉'}</span>
                    <span>获得新概念！${rarityText}</span>
                </div>
                <div class="concept-name" style="color: ${style.color}; text-shadow: 0 0 10px ${style.color};">${conceptName}</div>
            `;
            
            const container = document.getElementById('game-container');
            container.insertBefore(notification, container.firstChild);
            
            // 触发粒子特效（在屏幕中央）
            setTimeout(() => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                showCollectEffect(centerX, centerY, rarity);
            }, 100);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s ease';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }
        
        function updateStatus() {
            document.getElementById('universe-display').textContent = gameData.currentUniverse;
            document.getElementById('concepts-display').textContent = gameData.concepts.length;
            document.getElementById('score-display').textContent = gameData.score;
            document.getElementById('chapter-display').textContent = gameData.chapter;
        }
        
        function renderScene(sceneId) {
            // 🔧 v0.9 调试日志
            console.log('[renderScene] 开始渲染场景:', sceneId);
            console.log('[renderScene] 当前场景数据:', scenes[sceneId] ? '存在' : '不存在');
            
            const scene = scenes[sceneId];
            if (!scene) {
                console.error('[renderScene] ❌ 场景不存在:', sceneId);
                // 显示错误提示
                const container = document.getElementById('game-container');
                container.innerHTML = `
                    <div class="scene fade-in">
                        <h2 class="scene-title">❌ 场景加载失败</h2>
                        <div class="scene-text">
                            无法找到场景：<strong>${sceneId}</strong>
                            <br><br>
                            请尝试返回主宇宙重新选择。
                        </div>
                        <div class="choices">
                            <button class="choice-btn" onclick="renderScene('start')">
                                🏠 返回主宇宙
                            </button>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 执行 onEnter 回调（带错误处理）
            if (scene.onEnter) {
                try {
                    console.log('[renderScene] 执行 onEnter 回调...');
                    scene.onEnter();
                    console.log('[renderScene] ✅ onEnter 执行成功');
                } catch (error) {
                    console.error('[renderScene] ❌ onEnter 执行失败:', error);
                    // 继续渲染，不阻塞
                }
            }
            
            const container = document.getElementById('game-container');
            let text = typeof scene.text === 'function' ? scene.text() : scene.text;
            text = text.replace(/\${gameData\.concepts\.length}/g, gameData.concepts.length);
            
            container.innerHTML = `
                <div class="scene fade-in ${sceneId.startsWith('ending') ? 'ending-scene' : ''}">
                    <h2 class="scene-title ${sceneId.startsWith('ending') ? 'ending-title' : ''}">${scene.title}</h2>
                    <div class="scene-text ${sceneId.startsWith('ending') ? 'ending-text' : ''}">${text.replace(/\n/g, '<br>')}</div>
                    <div class="choices">
                        ${scene.choices.map((choice, index) => {
                            const conceptParam = choice.concept ? `, '${choice.concept}'` : '';
                            return `
                            <button class="choice-btn" onclick="navigateTo('${choice.next}'${conceptParam})">
                                ${choice.text}
                            </button>
                        `;
                        }).join('')}
                    </div>
                </div>
            `;
            
            updateStatus();
            updateUniverseSelector(sceneId);
            const container = document.getElementById('game-container');
            if (container) {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            console.log('[renderScene] ✅ 场景渲染完成:', sceneId);
        }
        
        function navigateTo(sceneId, conceptName) {
            // 🔧 v0.9 调试日志
            console.log('[navigateTo] 开始跳转:', sceneId);
            console.log('[navigateTo] 概念:', conceptName || '无');
            console.log('[navigateTo] 当前场景:', gameData.currentScene);
            
            try {
                gameData.choicesMade++;
                gameData.currentScene = sceneId;
                
                // 收集概念（如果选择支有 concept 属性）
                if (conceptName) {
                    console.log('[navigateTo] 收集概念:', conceptName);
                    collectConcept(conceptName);
                }
                
                // 更新宇宙状态
                if (sceneId.startsWith('space_')) {
                    gameData.currentUniverse = "太空歌剧宇宙";
                    console.log('[navigateTo] 🚀 切换到太空歌剧宇宙');
                }
                else if (sceneId.startsWith('time_')) {
                    gameData.currentUniverse = "时间旅行宇宙";
                    console.log('[navigateTo] ⏳ 切换到时间旅行宇宙');
                }
                else if (sceneId.startsWith('cyber_')) {
                    gameData.currentUniverse = "赛博朋克宇宙";
                    console.log('[navigateTo] 🌃 切换到赛博朋克宇宙');
                }
                else if (sceneId.startsWith('bio_')) {
                    gameData.currentUniverse = "生物朋克宇宙";
                    console.log('[navigateTo] 🧬 切换到生物朋克宇宙');
                }
                else if (sceneId.startsWith('magic_')) {
                    gameData.currentUniverse = "魔法科技宇宙";
                    console.log('[navigateTo] ✨ 切换到魔法科技宇宙');
                }
                else if (sceneId === 'start') {
                    gameData.currentUniverse = "主宇宙";
                    console.log('[navigateTo] 🌌 返回主宇宙');
                }
                
                console.log('[navigateTo] 调用 renderScene...');
                renderScene(sceneId);
                updateUniverseSelector(sceneId);
                checkAchievements();
                
                console.log('[navigateTo] ✅ 跳转完成:', sceneId);
            } catch (error) {
                console.error('[navigateTo] ❌ 跳转失败:', error);
                // 显示错误提示
                const container = document.getElementById('game-container');
                container.innerHTML = `
                    <div class="scene fade-in">
                        <h2 class="scene-title">❌ 跳转失败</h2>
                        <div class="scene-text">
                            无法跳转到场景：<strong>${sceneId}</strong>
                            <br><br>
                            错误信息：${error.message}
                            <br><br>
                            请查看浏览器控制台获取详细信息，或尝试返回主宇宙。
                        </div>
                        <div class="choices">
                            <button class="choice-btn" onclick="renderScene('start')">
                                🏠 返回主宇宙
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        // ============ 游戏初始化 ============
        window.addEventListener('DOMContentLoaded', () => {
            // 🔧 v0.9 调试日志
            console.log('[INIT] 🌌 游戏初始化开始');
            console.log('[INIT] 场景总数:', Object.keys(scenes).length);
            console.log('[INIT] 概念总数:', Object.keys(conceptDatabase).length);
            
            // 验证宇宙入口场景
            const universeIntros = ['cyber_intro', 'space_intro', 'time_intro', 'bio_intro', 'magic_intro'];
            universeIntros.forEach(sceneId => {
                console.log('[INIT] 检查宇宙入口:', sceneId, scenes[sceneId] ? '✅' : '❌');
            });
            
            // 初始化音频系统
            initAudio();
            
            // 初始化粒子特效系统
            initParticleEffect();
            
            let hasSaves = false;
            for (let i = 1; i <= 3; i++) {
                if (localStorage.getItem(SAVE_PREFIX + i)) {
                    hasSaves = true;
                    break;
                }
            }
            
            if (hasSaves) {
                const container = document.getElementById('game-container');
                container.innerHTML = `
                    <div class="scene fade-in">
                        <h2 class="scene-title">🎮 欢迎回来，收集者！</h2>
                        <div class="scene-text">
                            检测到你有保存的游戏进度。
                            <br><br>
                            你可以：
                        </div>
                        <div class="choices">
                            <button class="choice-btn" onclick="toggleSaveSystem(); selectSlot(1); loadGame()">
                                📂 读取存档
                            </button>
                            <button class="choice-btn" onclick="renderScene('start'); resetGameData()">
                                🔄 开始新游戏
                            </button>
                            <button class="choice-btn" onclick="showConcepts()">
                                📦 查看概念图鉴
                            </button>
                            <button class="choice-btn" onclick="showAchievements()">
                                🏆 查看成就
                            </button>
                        </div>
                    </div>
                `;
            } else {
                console.log('[INIT] 开始新游戏，渲染 start 场景');
                renderScene("start");
            }
            
            updateStatus();
            updateUniverseSelector("start");
            selectSlot(1);
            
            console.log('[INIT] ✅ 游戏初始化完成');
        });
        
        function resetGameData() {
            gameData.concepts = [];
            gameData.currentUniverse = "主宇宙";
            gameData.chapter = 1;
            gameData.score = 0;
            gameData.choicesMade = 0;
            gameData.achievements = [];
            gameData.playTime = 0;
            gameData.universesVisited = new Set();
            updateStatus();
        }
    </script>
</body>
</html>
