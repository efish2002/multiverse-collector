<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🌌 多元宇宙概念收集者 v0.19 - 第二阶段关键剧情场景扩充版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.8;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: clamp(1.5em, 5vw, 2.5em);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: clamp(0.9em, 3vw, 1.1em);
        }
        
        .scene {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .scene-title {
            font-size: clamp(1.3em, 4vw, 1.8em);
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .scene-text {
            font-size: clamp(1em, 3.5vw, 1.1em);
            margin-bottom: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .choice-btn {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 25px);
            border-radius: 10px;
            font-size: clamp(1em, 3.5vw, 1.1em);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4));
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .choice-btn:active {
            transform: scale(0.98);
        }
        
        .status-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-label {
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            color: #888;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: clamp(1.2em, 4vw, 1.5em);
            font-weight: bold;
            color: #667eea;
        }
        
        .concept-collected {
            background: linear-gradient(135deg, rgba(67, 233, 123, 0.2), rgba(56, 249, 215, 0.2));
            border: 2px solid rgba(67, 233, 123, 0.5);
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            margin: 20px 0;
            animation: glow 2s ease-in-out infinite;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            min-width: 300px;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(67, 233, 123, 0.5); }
            50% { box-shadow: 0 0 40px rgba(67, 233, 123, 0.8); }
        }
        
        .concept-name {
            font-size: clamp(1.2em, 4vw, 1.5em);
            font-weight: bold;
            color: #43e97b;
        }
        
        .hidden {
            display: none !important;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .save-system {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .save-system-title {
            font-size: clamp(1.2em, 4vw, 1.4em);
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .save-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .save-slot {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .save-slot:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-3px);
        }
        
        .save-slot.has-data {
            border-color: rgba(67, 233, 123, 0.5);
        }
        
        .save-slot.has-data:hover {
            border-color: #43e97b;
            background: rgba(67, 233, 123, 0.1);
        }
        
        .save-slot-info {
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            color: #888;
            margin-top: 8px;
        }
        
        .save-slot-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .save-btn, .load-btn, .delete-btn {
            padding: clamp(8px, 2.5vw, 10px) clamp(12px, 3vw, 16px);
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .load-btn {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a1a2e;
        }
        
        .load-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }
        
        .delete-btn {
            background: rgba(255, 100, 100, 0.3);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.5);
        }
        
        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.5);
            transform: scale(1.05);
        }
        
        .save-message {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .save-success {
            background: rgba(67, 233, 123, 0.2);
            color: #43e97b;
        }
        
        .save-error {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
        }
        
        .menu-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .menu-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: clamp(10px, 2.5vw, 12px) clamp(15px, 3vw, 20px);
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.9em, 2.5vw, 1em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .menu-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .menu-btn:active {
            transform: scale(0.98);
        }
        
        .concept-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }
        
        .concept-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        
        .concept-card.common { border-color: #4a9eff; }
        .concept-card.rare { border-color: #a335ee; }
        .concept-card.epic { border-color: #ff8000; }
        .concept-card.legendary { border-color: #ffcc00; }
        
        .concept-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .concept-card-title {
            font-size: clamp(1.1em, 3.5vw, 1.2em);
            font-weight: bold;
            color: #667eea;
        }
        
        .rarity-badge {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: clamp(0.75em, 2.5vw, 0.8em);
            font-weight: bold;
        }
        
        .rarity-badge.common { background: #4a9eff; color: white; }
        .rarity-badge.rare { background: #a335ee; color: white; }
        .rarity-badge.epic { background: #ff8000; color: white; }
        .rarity-badge.legendary { background: #ffcc00; color: black; }
        
        .concept-card-body {
            font-size: clamp(0.9em, 3vw, 0.95em);
            color: #ccc;
        }
        
        .concept-card-science {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            color: #888;
        }
        
        .locked-concept {
            opacity: 0.5;
            filter: blur(2px);
            pointer-events: none;
        }
        
        .achievement-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
            min-width: 200px;
        }
        
        .achievement-card.unlocked {
            border-color: #f0a500;
            background: rgba(240, 165, 0, 0.1);
        }
        
        .achievement-card.locked {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        
        .achievement-icon {
            font-size: clamp(2.5em, 6vw, 3em);
            margin-bottom: 10px;
        }
        
        .achievement-name {
            font-size: clamp(1em, 3vw, 1.1em);
            font-weight: bold;
            color: #f0a500;
            margin-bottom: 5px;
        }
        
        .achievement-desc {
            font-size: clamp(0.85em, 2.5vw, 0.9em);
            color: #888;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            font-size: clamp(0.85em, 2.5vw, 0.9em);
        }
        
        .ending-scene {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 3px solid #667eea;
        }
        
        .ending-title {
            font-size: clamp(1.8em, 5vw, 2.5em);
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }
        
        .ending-text {
            font-size: clamp(1.1em, 3.5vw, 1.2em);
            line-height: 2;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stats-summary {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        
        .return-btn {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.3), rgba(255, 150, 150, 0.3));
            border: 2px solid rgba(255, 100, 100, 0.6);
            color: #ff6464;
            padding: clamp(10px, 2.5vw, 12px) clamp(15px, 3vw, 20px);
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.9em, 2.5vw, 1em);
            transition: all 0.3s;
            min-height: 44px;
            touch-action: manipulation;
            font-weight: bold;
        }
        
        .return-btn:hover {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.5), rgba(255, 150, 150, 0.5));
            border-color: #ff6464;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 100, 100, 0.4);
        }
        
        .return-btn:active {
            transform: scale(0.98);
        }
        
        .music-controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .music-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 2px solid rgba(102, 126, 234, 0.5);
            color: #e0e0e0;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
        }
        
        .music-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: #667eea;
        }
        
        .music-btn:active {
            transform: scale(0.95);
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 150px;
        }
        
        .volume-slider {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
        }
        
        .volume-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }
        
        .music-status {
            font-size: 0.9em;
            color: #888;
            min-width: 80px;
            text-align: center;
        }
        
        @media screen and (orientation: landscape) and (max-height: 500px) {
            .container { padding: 15px; }
            .scene { padding: 15px; }
            h1 { font-size: 1.8em; }
            .status-bar { grid-template-columns: repeat(4, 1fr); }
        }
        
        @media screen and (max-width: 480px) {
            body { padding: 5px; }
            .container { padding: 15px; border-radius: 15px; }
            .menu-bar { gap: 8px; }
            .menu-btn { flex: 1 1 calc(50% - 8px); text-align: center; }
            .status-bar { grid-template-columns: repeat(2, 1fr); }
            .save-slots { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌌 多元宇宙概念收集者</h1>
            <div class="subtitle">v0.19 - 第二阶段关键剧情场景扩充版 | 20 场景文学扩充 | 5 大宇宙</div>
        </header>
        
        <div class="music-controls">
            <button class="music-btn" id="music-toggle" onclick="toggleMusic()">🎵 音乐：开</button>
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" onchange="setVolume(this.value)">
            </div>
            <button class="music-btn" onclick="nextTrack()">⏭️ 下一首</button>
            <div class="music-status" id="music-status">加载中...</div>
        </div>
        
        <div class="menu-bar">
            <button class="return-btn hidden" id="return-home-btn" onclick="returnToHome()">🏠 返回主宇宙</button>
            <button class="menu-btn" onclick="toggleSaveSystem()">💾 存档管理</button>
            <button class="menu-btn" onclick="toggleConcepts()">📦 概念图鉴</button>
            <button class="menu-btn" onclick="toggleAchievements()">🏆 成就系统</button>
            <button class="menu-btn" onclick="resetGame()">🔄 重新开始</button>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">🌍 当前宇宙</div>
                <div class="status-value" id="universe-display">主宇宙</div>
            </div>
            <div class="status-item">
                <div class="status-label">📦 收集概念</div>
                <div class="status-value" id="concepts-display">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">⭐ 得分</div>
                <div class="status-value" id="score-display">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">📖 章节</div>
                <div class="status-value" id="chapter-display">1</div>
            </div>
        </div>
        
        <div id="save-system" class="save-system hidden">
            <h2 class="save-system-title">💾 存档管理</h2>
            <div class="save-slots">
                <div class="save-slot" id="slot-1" onclick="selectSlot(1)">
                    <div><strong>存档位 1</strong></div>
                    <div class="save-slot-info" id="slot-1-info">空</div>
                </div>
                <div class="save-slot" id="slot-2" onclick="selectSlot(2)">
                    <div><strong>存档位 2</strong></div>
                    <div class="save-slot-info" id="slot-2-info">空</div>
                </div>
                <div class="save-slot" id="slot-3" onclick="selectSlot(3)">
                    <div><strong>存档位 3</strong></div>
                    <div class="save-slot-info" id="slot-3-info">空</div>
                </div>
            </div>
            <div class="save-slot-actions">
                <button class="save-btn" onclick="saveGame()">💾 保存</button>
                <button class="load-btn" onclick="loadGame()">📂 读取</button>
                <button class="delete-btn" onclick="deleteSave()">🗑️ 删除</button>
            </div>
            <div id="save-message" class="save-message hidden"></div>
        </div>
        
        <div id="concept-gallery" class="save-system hidden">
            <h2 class="save-system-title">📦 概念图鉴</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="concept-progress-bar" style="width: 0%"></div>
            </div>
            <div style="text-align: center; margin-bottom: 20px;">
                收集进度：<span id="concept-progress">0/100</span>
            </div>
            <div id="concept-list"></div>
        </div>
        
        <div id="achievement-system" class="save-system hidden">
            <h2 class="save-system-title">🏆 成就系统</h2>
            <div id="achievement-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
        </div>
        
        <div id="game-container"></div>
        
        <footer>
            <div>🎮 多元宇宙概念收集者 v0.19 - 第二阶段关键剧情场景扩充版</div>
            <div>© 2024 科幻游戏实验室 | 第二阶段：20 场景文学扩充完成（600-800 字/场景）</div>
        </footer>
    </div>
    
    <script>
        // ============ 音乐系统 ============
        const musicTracks = [
            { name: "赛博朋克", url: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c80a92896f.mp3?filename=cyberpunk-city-112247.mp3" },
            { name: "太空探索", url: "https://cdn.pixabay.com/download/audio/2022/03/24/audio_c617521644.mp3?filename=space-atmosphere-112896.mp3" },
            { name: "神秘魔法", url: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69c2.mp3?filename=fantasy-magic-110295.mp3" },
            { name: "未来科技", url: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_6389620a5d.mp3?filename=futuristic-technology-112467.mp3" },
            { name: "生命科学", url: "https://cdn.pixabay.com/download/audio/2021/11/25/audio_0f9a9f5b62.mp3?filename=ambient-science-109384.mp3" }

                text: `水晶能源中心是魔法学院的能量心脏，是整个魔法科技文明的能源基石。这里被厚重的防护墙保护着，墙壁由铅板和魔力吸收材料交替构成，防止能量泄漏影响周围环境。任何未经授权的魔力释放都可能引发灾难性的能量风暴，所以安全措施极其严格：入口处有魔力浓度检测门，超过阈值会触发警报；墙壁上镶嵌着能量监测仪，实时显示每个水晶簇的状态；天花板上悬挂着能量疏导装置，一旦检测到能量异常，会立即将其引导到安全区域。

"一百个概念，"声音继续说道，"意味着你见证了多元宇宙的全部奥秘。你理解了科技与魔法的本质，见证了生命与意识的起源，体验了时间与空间的奥秘。你是主宇宙的英雄，是多元宇宙的守护者。你的名字将被永远铭记。"

你看着手中的印记，心中涌起一阵难以言喻的情感。这不仅仅是一个成就，这是一个传奇的完成。你不仅仅是一个收集者，你是救世主。

【结局】完美新生
【收集度】100%
【评价】你的努力让主宇宙完全恢复。你是英雄，是传奇，是多元宇宙的守护者。

你的旅程，达到了完美的终点。但传奇，才刚刚开始。`,
                onEnter: () => {
                    unlockAchievement('ending_100');
                    playSound('achievement');
                },
                choices: [
                    { text: "🔄 再次旅程", next: "start" }
                ]
            }
        };
        
        // ============ 音乐切换函数 ============
        function switchMusic(trackIndex) {
            if (!isMusicPlaying) return;
            if (trackIndex !== currentTrackIndex) {
                loadTrack(trackIndex);
            }
        }
        
        // ============ 存档系统函数 ============
        function toggleSaveSystem() {
            const saveSystem = document.getElementById('save-system');
            const gallery = document.getElementById('concept-gallery');
            const achievementSystem = document.getElementById('achievement-system');
            
            if (!saveSystem.classList.contains('hidden')) {
                saveSystem.classList.add('hidden');
                return;
            }
            
            playSound('save');
            gallery.classList.add('hidden');
            achievementSystem.classList.add('hidden');
            saveSystem.classList.remove('hidden');
        }
        
        function selectSlot(slot) {
            selectedSlot = slot;
            document.querySelectorAll('.save-slot').forEach(s => s.style.borderColor = 'rgba(102, 126, 234, 0.3)');
            document.getElementById(`slot-${slot}`).style.borderColor = '#667eea';
            updateSlotInfo();
        }
        
        function updateSlotInfo() {
            for (let i = 1; i <= 3; i++) {
                const saved = localStorage.getItem(SAVE_PREFIX + i);
                const info = document.getElementById(`slot-${i}-info`);
                if (saved) {
                    const data = JSON.parse(saved);
                    info.textContent = `${data.currentUniverse} | ${data.concepts.length}概念 | ${data.score}分`;
                    document.getElementById(`slot-${i}`).classList.add('has-data');
                } else {
                    info.textContent = '空';
                    document.getElementById(`slot-${i}`).classList.remove('has-data');
                }
            }
        }
        
        function saveGame() {
            gameData.timestamp = Date.now();
            gameData.currentScene = getCurrentScene();
            gameData.universesVisited = Array.from(gameData.universesVisited);
            localStorage.setItem(SAVE_PREFIX + selectedSlot, JSON.stringify(gameData));
            playSound('save');
            showMessage('存档成功！', 'success');
            updateSlotInfo();
        }
        
        function loadGame() {
            const saved = localStorage.getItem(SAVE_PREFIX + selectedSlot);
            if (!saved) {
                showMessage('该存档位为空！', 'error');
                return;
            }
            const data = JSON.parse(saved);
            Object.assign(gameData, data);
            gameData.universesVisited = new Set(data.universesVisited || []);
            renderScene(gameData.currentScene || "start");
            playSound('save');
            showMessage('读档成功！', 'success');
            toggleSaveSystem();
        }
        
        function deleteSave() {
            if (confirm('确定要删除这个存档吗？')) {
                localStorage.removeItem(SAVE_PREFIX + selectedSlot);
                showMessage('存档已删除！', 'success');
                updateSlotInfo();
            }
        }
        
        function showMessage(msg, type) {
            const el = document.getElementById('save-message');
            el.textContent = msg;
            el.className = 'save-message ' + (type === 'success' ? 'save-success' : 'save-error');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 2000);
        }
        
        function getCurrentScene() {
            return gameData.currentScene;
        }
        
        // ============ 概念图鉴函数 ============
        function toggleConcepts() {
            const gallery = document.getElementById('concept-gallery');
            const saveSystem = document.getElementById('save-system');
            const achievementSystem = document.getElementById('achievement-system');
            
            if (!gallery.classList.contains('hidden')) {
                gallery.classList.add('hidden');
                return;
            }
            
            saveSystem.classList.add('hidden');
            achievementSystem.classList.add('hidden');
            gallery.classList.remove('hidden');
            
            const total = Object.keys(conceptDatabase).length;
            const collected = gameData.concepts.length;
            document.getElementById('concept-progress').textContent = `${collected}/${total}`;
            document.getElementById('concept-progress-bar').style.width = `${(collected/total)*100}%`;
            
            const list = document.getElementById('concept-list');
            list.innerHTML = '';
            
            for (const [id, concept] of Object.entries(conceptDatabase)) {
                const isCollected = gameData.concepts.includes(concept.name);
                const card = document.createElement('div');
                card.className = `concept-card ${concept.rarity.toLowerCase()} ${isCollected ? '' : 'locked-concept'}`;
                card.innerHTML = `
                    <div class="concept-card-header">
                        <span class="concept-card-title">${isCollected ? concept.name : '🔒 未收集'}</span>
                        <span class="rarity-badge ${concept.rarity.toLowerCase()}">${concept.rarity}</span>
                    </div>
                    <div class="concept-card-body">
                        ${isCollected ? `
                            <div><strong>类别:</strong> ${concept.category}</div>
                            <div><strong>描述:</strong> ${concept.description}</div>
                            <div class="concept-card-science"><strong>科学原理:</strong> ${concept.science}</div>
                        ` : '<div style="color: #666;">探索宇宙以解锁此概念</div>'}
                    </div>
                `;
                list.appendChild(card);
            }
        }
        
        // ============ 成就系统函数 ============
        function toggleAchievements() {
            const system = document.getElementById('achievement-system');
            const saveSystem = document.getElementById('save-system');
            const gallery = document.getElementById('concept-gallery');
            
            if (!system.classList.contains('hidden')) {
                system.classList.add('hidden');
                return;
            }
            
            saveSystem.classList.add('hidden');
            gallery.classList.add('hidden');
            system.classList.remove('hidden');
            
            const list = document.getElementById('achievement-list');
            list.innerHTML = '';
            list.style.display = 'grid';
            list.style.gridTemplateColumns = 'repeat(auto-fit, minmax(200px, 1fr))';
            list.style.gap = '15px';
            
            for (const ach of achievements) {
                const isUnlocked = gameData.achievements.includes(ach.id);
                const card = document.createElement('div');
                card.className = `achievement-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.innerHTML = `
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-name">${ach.name}</div>
                    <div class="achievement-desc">${ach.desc}</div>
                    ${isUnlocked ? '<div style="color: #43e97b; margin-top: 5px;">✓ 已解锁</div>' : '<div style="color: #666; margin-top: 5px;">🔒 未解锁</div>'}
                `;
                list.appendChild(card);
            }
        }
        
        // ============ 游戏核心函数 ============
        function unlockAchievement(achievementId) {
            if (!gameData.achievements.includes(achievementId)) {
                gameData.achievements.push(achievementId);
                const ach = achievements.find(a => a.id === achievementId);
                if (ach) {
                    playSound('achievement');
                    showAchievementNotification(ach);
                }
            }
        }
        
        function checkAchievements() {
            const newAchievements = [];
            
            if (gameData.concepts.length >= 1 && !gameData.achievements.includes('first_concept')) {
                newAchievements.push('first_concept');
            }
            if (gameData.concepts.length >= 10 && !gameData.achievements.includes('collector_10')) {
                newAchievements.push('collector_10');
            }
            if (gameData.concepts.length >= 30 && !gameData.achievements.includes('collector_30')) {
                newAchievements.push('collector_30');
            }
            if (gameData.concepts.length >= 50 && !gameData.achievements.includes('collector_50')) {
                newAchievements.push('collector_50');
            }
            if (gameData.concepts.length >= 80 && !gameData.achievements.includes('collector_80')) {
                newAchievements.push('collector_80');
            }
            if (gameData.concepts.length >= 100 && !gameData.achievements.includes('collector_100')) {
                newAchievements.push('collector_100');
            }
            if (gameData.universesVisited.size >= 5 && !gameData.achievements.includes('all_universes')) {
                newAchievements.push('all_universes');
            }
            if (gameData.universesVisited.size >= 1 && !gameData.achievements.includes('universe_jumper')) {
                newAchievements.push('universe_jumper');
            }
            if (gameData.score >= 500 && !gameData.achievements.includes('score_500')) {
                newAchievements.push('score_500');
            }
            if (gameData.score >= 1000 && !gameData.achievements.includes('score_1000')) {
                newAchievements.push('score_1000');
            }
            if (gameData.score >= 2000 && !gameData.achievements.includes('score_2000')) {
                newAchievements.push('score_2000');
            }
            if (gameData.choicesMade >= 100 && !gameData.achievements.includes('decision_maker')) {
                newAchievements.push('decision_maker');
            }
            
            if (newAchievements.length > 0) {
                gameData.achievements.push(...newAchievements);
                for (const achId of newAchievements) {
                    const ach = achievements.find(a => a.id === achId);
                    if (ach) showAchievementNotification(ach);
                }
            }
        }
        
        function showAchievementNotification(achievement) {
            playSound('achievement');
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            spawnParticles(centerX, centerY, 80, '#f0a500', 'sparkle');
            spawnParticles(centerX, centerY, 50, '#ffd700', 'sparkle');
            
            const notification = document.createElement('div');
            notification.className = 'concept-collected fade-in';
            notification.style.background = 'linear-gradient(135deg, rgba(240, 165, 0, 0.3), rgba(255, 196, 0, 0.3))';
            notification.style.borderColor = 'rgba(240, 165, 0, 0.6)';
            notification.style.boxShadow = '0 0 30px rgba(240, 165, 0, 0.6)';
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                    <span>🏆</span>
                    <span>成就解锁！</span>
                </div>
                <div class="concept-name" style="color: #f0a500; text-shadow: 0 0 10px #f0a500;">${achievement.name}</div>
                <div style="font-size: 0.9em; color: #ccc;">${achievement.desc}</div>
            `;
            const container = document.getElementById('game-container');
            container.insertBefore(notification, container.firstChild);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s ease';
                setTimeout(() => notification.remove(), 500);
            }, 4000);
        }
        
        function checkEnding() {
            const collected = gameData.concepts.length;
            const total = Object.keys(conceptDatabase).length;
            const percentage = (collected / total) * 100;
            
            // Check for achievement milestones first
            if (collected === 1 && !gameData.achievements.includes('first_concept')) {
                setTimeout(() => navigateTo("achievement_first"), 500);
                return;
            }
            if (collected === 10 && !gameData.achievements.includes('collector_10')) {
                setTimeout(() => navigateTo("achievement_10"), 500);
                return;
            }
            if (collected === 30 && !gameData.achievements.includes('collector_30')) {
                setTimeout(() => navigateTo("achievement_30"), 500);
                return;
            }
            if (collected === 50 && !gameData.achievements.includes('collector_50')) {
                setTimeout(() => navigateTo("achievement_50"), 500);
                return;
            }
            
            // Check for ending conditions
            if (percentage >= 100 && !gameData.achievements.includes('ending_100')) {
                setTimeout(() => navigateTo("ending_100"), 1000);
            } else if (percentage >= 80 && !gameData.achievements.includes('ending_80')) {
                setTimeout(() => navigateTo("ending_80"), 1000);
            } else if (percentage >= 50 && !gameData.achievements.includes('ending_50')) {
                setTimeout(() => navigateTo("ending_50"), 1000);
            }
        }
        
        function resetGame() {
            if (confirm('确定要重新开始游戏吗？当前进度将丢失（除非已保存）！')) {
                gameData.concepts = [];
                gameData.currentUniverse = "主宇宙";
                gameData.chapter = 1;
                gameData.score = 0;
                gameData.choicesMade = 0;
                gameData.achievements = [];
                gameData.playTime = 0;
                gameData.universesVisited = new Set();
                renderScene("start");
                updateStatus();
            }
        }
        
        function collectConcept(conceptName) {
            if (!gameData.concepts.includes(conceptName)) {
                gameData.concepts.push(conceptName);
                const concept = Object.values(conceptDatabase).find(c => c.name === conceptName);
                const score = concept ? (rarityScores[concept.rarity] || 10) : 10;
                gameData.score += score;
                playSound('collect');
                showConceptNotification(conceptName, concept ? concept.rarity : null);
                checkAchievements();
                checkEnding();
            }
        }
        
        function showConceptNotification(conceptName, rarity) {
            const notification = document.createElement('div');
            notification.className = 'concept-collected fade-in';
            const rarityText = rarity ? `【${rarity}】+${rarityScores[rarity] || 10}分` : '';
            notification.innerHTML = `
                <div>🎉 获得新概念！</div>
                <div class="concept-name">${conceptName}</div>
                <div style="font-size: 0.9em; color: #ccc; margin-top: 5px;">${rarityText}</div>
            `;
            const container = document.getElementById('game-container');
            container.insertBefore(notification, container.firstChild);
            setTimeout(() => notification.remove(), 3000);
        }
        
        function updateStatus() {
            document.getElementById('universe-display').textContent = gameData.currentUniverse;
            document.getElementById('concepts-display').textContent = gameData.concepts.length;
            document.getElementById('score-display').textContent = gameData.score;
            document.getElementById('chapter-display').textContent = gameData.chapter;
        }
        
        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) {
                console.error(`Scene '${sceneId}' not found`);
                return;
            }
            
            if (scene.onEnter) scene.onEnter();
            
            const container = document.getElementById('game-container');
            let text = typeof scene.text === 'function' ? scene.text() : scene.text;
            text = text.replace(/\${gameData\.concepts\.length}/g, gameData.concepts.length);
            
            container.innerHTML = `
                <div class="scene fade-in ${sceneId.startsWith('ending') ? 'ending-scene' : ''}">
                    <h2 class="scene-title ${sceneId.startsWith('ending') ? 'ending-title' : ''}">${scene.title}</h2>
                    <div class="scene-text ${sceneId.startsWith('ending') ? 'ending-text' : ''}">${text.replace(/\n/g, '<br>')}</div>
                    <div class="choices">
                        ${scene.choices.map((choice, index) => {
                            const conceptParam = choice.concept ? `, '${choice.concept}'` : '';
                            return `
                            <button class="choice-btn" onclick="navigateTo('${choice.next}'${conceptParam})">
                                ${choice.text}
                            </button>
                        `;
                        }).join('')}
                    </div>
                </div>
            `;
            
            updateStatus();
            updateReturnButton();
            
            const sceneElement = container.querySelector('.scene');
            if (sceneElement) {
                sceneElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        function returnToHome() {
            playSound('sceneChange');
            renderScene('start');
        }
        
        function updateReturnButton() {
            const returnBtn = document.getElementById('return-home-btn');
            if (returnBtn) {
                if (gameData.currentScene === 'start') {
                    returnBtn.classList.add('hidden');
                } else {
                    returnBtn.classList.remove('hidden');
                }
            }
        }
        
        function navigateTo(sceneId, conceptName) {
            gameData.choicesMade++;
            gameData.currentScene = sceneId;
            
            if (conceptName) {
                collectConcept(conceptName);
            }
            
            if (sceneId.startsWith('space_')) gameData.currentUniverse = "太空歌剧宇宙";
            else if (sceneId.startsWith('time_')) gameData.currentUniverse = "时间旅行宇宙";
            else if (sceneId.startsWith('cyber_')) gameData.currentUniverse = "赛博朋克宇宙";
            else if (sceneId.startsWith('bio_')) gameData.currentUniverse = "生物朋克宇宙";
            else if (sceneId.startsWith('magic_')) gameData.currentUniverse = "魔法科技宇宙";
            else if (sceneId === 'start') gameData.currentUniverse = "主宇宙";
            
            renderScene(sceneId);
            checkAchievements();
        }
        
        // ============ 游戏初始化 ============
        window.addEventListener('DOMContentLoaded', () => {
            initAudio();
            
            let hasSaves = false;
            for (let i = 1; i <= 3; i++) {
                if (localStorage.getItem(SAVE_PREFIX + i)) {
                    hasSaves = true;
                    break;
                }
            }
            
            if (hasSaves) {
                const container = document.getElementById('game-container');
                container.innerHTML = `
                    <div class="scene fade-in">
                        <h2 class="scene-title">🎮 欢迎回来，收集者！</h2>
                        <div class="scene-text">
                            检测到你有保存的游戏进度。
                            <br><br>
                            你可以：
                        </div>
                        <div class="choices">
                            <button class="choice-btn" onclick="toggleSaveSystem(); selectSlot(1); loadGame()">
                                📂 读取存档
                            </button>
                            <button class="choice-btn" onclick="renderScene('start'); resetGameData()">
                                🔄 开始新游戏
                            </button>
                            <button class="choice-btn" onclick="toggleConcepts()">
                                📦 查看概念图鉴
                            </button>
                            <button class="choice-btn" onclick="toggleAchievements()">
                                🏆 查看成就
                            </button>
                        </div>
                    </div>
                `;
            } else {
                renderScene("start");
            }
            
            updateStatus();
            selectSlot(1);
        });
        
        function resetGameData() {
            gameData.concepts = [];
            gameData.currentUniverse = "主宇宙";
            gameData.chapter = 1;
            gameData.score = 0;
            gameData.choicesMade = 0;
            gameData.achievements = [];
            gameData.playTime = 0;
            gameData.universesVisited = new Set();
            updateStatus();
        }
    </script>
</body>
</html>
