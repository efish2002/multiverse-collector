<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 多元宇宙概念收集者 - 宇宙选择</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .universe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .universe-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .universe-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }
        .universe-icon { font-size: 3em; margin-bottom: 15px; }
        .universe-title { font-size: 1.3em; margin-bottom: 10px; color: #667eea; }
        .universe-desc { font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 多元宇宙概念收集者</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">
            选择一个宇宙开始你的科幻探索之旅...
        </p>
        
        <div class="universe-grid">
            <a href="赛博朋克宇宙.html" class="universe-card">
                <div class="universe-icon">🌃</div>
                <div class="universe-title">赛博朋克宇宙</div>
                <div class="universe-desc">霓虹闪烁的未来都市，义体改造与人工智能</div>
            </a>
            
            <a href="太空歌剧宇宙.html" class="universe-card">
                <div class="universe-icon">🚀</div>
                <div class="universe-title">太空歌剧宇宙</div>
                <div class="universe-desc">星际联邦的宏伟空间站，银河系文明</div>
            </a>
            
            <a href="时间旅行宇宙.html" class="universe-card">
                <div class="universe-icon">⏳</div>
                <div class="universe-title">时间旅行宇宙</div>
                <div class="universe-desc">时间管理局，时间线与平行宇宙</div>
            </a>
            
            <a href="生物朋克宇宙.html" class="universe-card">
                <div class="universe-icon">🧬</div>
                <div class="universe-title">生物朋克宇宙</div>
                <div class="universe-desc">基因圣殿，生命科学的终极殿堂</div>
            </a>
            
            <a href="魔法科技宇宙.html" class="universe-card">
                <div class="universe-icon">✨</div>
                <div class="universe-title">魔法科技宇宙</div>
                <div class="universe-desc">魔法与科技的融合，符文编程</div>
            </a>
        </div>
    </div>
</body>
</html>
