<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🧬 生物朋克宇宙 - 多元宇宙概念收集者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1a0a 0%, #1a2e1a 50%, #2e4a2e 100%); color: #e0e0e0; line-height: 1.8; min-height: 100vh; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        h1 { font-size: clamp(1.5em, 5vw, 2.5em); margin-bottom: 10px; background: linear-gradient(135deg, #00ff88, #00cc66); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-bar { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .status-item { font-size: 0.95em; }
        .scene { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,136,0.2); }
        .scene-title { font-size: clamp(1.3em, 4vw, 1.8em); margin-bottom: 15px; color: #00ff88; }
        .scene-text { font-size: clamp(1em, 3.5vw, 1.1em); margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,204,102,0.2)); border: 2px solid rgba(0,255,136,0.5); color: #e0e0e0; padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 25px); border-radius: 10px; font-size: clamp(1em, 3.5vw, 1.1em); cursor: pointer; transition: all 0.3s; text-align: left; min-height: 44px; }
        .choice-btn:hover { background: rgba(0,255,136,0.3); transform: translateX(5px); }
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
        .nav-btn:hover { background: rgba(0,255,136,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧬 生物朋克宇宙</h1>
            <div class="status-bar">
                <div class="status-item">📦 概念：<span id="concept-count">0</span>/20</div>
                <div class="status-item">⭐ 得分：<span id="score">0</span></div>
                <div class="status-item">🏆 成就：<span id="achievement-count">0</span></div>
            </div>
        </header>
        <div id="game-container"></div>
    </div>
    <div class="nav-bar">
        <a href="宇宙入口.html" class="nav-btn">🏠 返回入口</a>
        <a href="赛博朋克宇宙.html" class="nav-btn">🌃 赛博朋克</a>
        <a href="太空歌剧宇宙.html" class="nav-btn">🚀 太空歌剧</a>
        <a href="时间旅行宇宙.html" class="nav-btn">⏳ 时间旅行</a>
        <a href="魔法科技宇宙.html" class="nav-btn">✨ 魔法科技</a>
    </div>
    <script>
        const gameData = { concepts: [], score: 0, achievements: [] };
        const scenes = {
            "bio_intro": {
                title: "🧬 生物朋克宇宙 - 基因圣殿",
                text: `你穿过光门，发现自己站在一个充满生机的巨大建筑中。

墙壁由活体组织构成，散发着柔和的蓝光。血管网络在墙壁中脉动，输送着某种发光的液体。空气中弥漫着淡淡的生物气息，混合着花香和某种你无法辨认的化学味道。

"欢迎来到基因圣殿，收集者。"一个温和的声音响起。

你看到一位身着白色生物长袍的女性，她的皮肤上有着奇异的发光纹路——那是基因优化的标志。

"我是艾娃博士，这里的基因工程师。"她微笑着说，她的眼睛闪烁着金色的光芒，"在这个宇宙中，生命科学已经发展到极致。我们可以设计生命、编辑基因、甚至创造全新的物种。"

她指向三个方向，每个方向都代表着生命科学的不同分支：`,
                choices: [
                    { text: "🔬 前往基因实验室", next: "bio_lab" },
                    { text: "💻 探索生物计算机中心", next: "bio_computer" },
                    { text: "🌱 参观合成生命培育舱", next: "bio_synthetic" }
                ]
            },
            "bio_lab": {
                title: "🔬 基因实验室 - 生命的密码",
                text: `你走进一座充满未来感的实验室，墙壁上挂满了 DNA 双螺旋结构的可视化图像。

"基因编辑是生命科学的核心。"艾娃博士说，"CRISPR-Cas9 只是起点。我们现在可以精确地修改任何基因序列。"

培养皿中，细胞正在分裂，发出微弱的荧光。屏幕上显示着复杂的基因序列：ATCG...

"我们可以治愈遗传疾病、增强智力、延长寿命...甚至可以设计新的人类亚种。"`,
                choices: [
                    { text: "🧬 学习基因编辑技术", next: "bio_edit_study", concept: "基因编辑" },
                    { text: "🔙 返回基因圣殿", next: "bio_intro" }
                ]
            },
            "bio_edit_study": {
                title: "🧬 基因编辑技术",
                text: `你仔细观察基因编辑的过程。

CRISPR-Cas9 系统就像一把分子剪刀，可以精确地切割 DNA 的特定位置。然后细胞自身的修复机制会填补空缺，实现基因的修改。

"但我们有更先进的技术。"艾娃博士说，"碱基编辑、引导编辑、表观遗传编辑...我们可以不切断 DNA 就修改基因。"

屏幕上显示着一个胚胎的基因图谱，某些片段被高亮标记。`,
                choices: [
                    { text: "🔙 返回实验室", next: "bio_lab" }
                ]
            },
            "bio_computer": {
                title: "💻 生物计算机中心 - 有机计算",
                text: `你走进一个奇异的房间，这里没有硅芯片，只有培养皿中的神经网络。

"这是生物计算机。"工程师解释道，"我们使用神经元细胞进行计算，而不是晶体管。"

培养皿中，神经元在生长、连接、传递信号。它们的学习速度比传统 AI 快 1000 倍，能耗却只有百万分之一。

"生物计算机可以自我修复、自我进化。它们是有生命的计算机。"`,
                choices: [
                    { text: "🧠 了解生物计算原理", next: "bio_computer_study", concept: "生物计算机" },
                    { text: "🔙 返回基因圣殿", next: "bio_intro" }
                ]
            },
            "bio_computer_study": {
                title: "🧠 生物计算原理",
                text: `你仔细观察生物计算机的工作方式。

神经元通过突触连接，传递电化学信号。每个神经元可以连接数千个其他神经元，形成复杂的网络。

"传统计算机是 0 和 1，但生物计算机是模拟的。"工程师说，"它可以处理模糊逻辑、情感、直觉——这些是硅基计算机永远无法做到的。"

培养皿中的神经网络突然亮起，完成了一次复杂的计算。`,
                choices: [
                    { text: "🔙 返回中心", next: "bio_computer" }
                ]
            },
            "bio_synthetic": {
                title: "🌱 合成生命培育舱 - 人造生命",
                text: `你走进一座巨大的大厅，里面排列着数百个透明的培育舱。

每个培育舱中都生长着不同的生物：发光的植物、多眼的动物、半机械半生物的混合体...

"这里是合成生命培育中心。"艾娃博士说，"我们从零开始设计生命。不依赖自然进化，而是根据需求创造。"

一个培育舱中，一个胚胎正在发育——它有人类的身体，但皮肤下可见发光的血管。`,
                choices: [
                    { text: "🔬 学习合成生命技术", next: "bio_synthetic_study", concept: "合成生命" },
                    { text: "🔙 返回基因圣殿", next: "bio_intro" }
                ]
            },
            "bio_synthetic_study": {
                title: "🔬 合成生命技术",
                text: `"合成生命的关键是理解生命的本质。"艾娃博士说。

她调出一个全息投影，显示着一个最小细胞的结构：细胞膜、核糖体、DNA、代谢系统...

"我们从这些基本组件开始，然后添加想要的特性：发光、自我修复、环境适应..."

"但伦理问题呢？"你问道。

艾娃沉默了片刻，"这就是为什么我们有严格的伦理委员会。创造生命是神圣的，不能轻率。"`,
                choices: [
                    { text: "🔙 返回培育舱", next: "bio_synthetic" }
                ]
            }
        };
        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) { document.getElementById('game-container').innerHTML = '<div class="scene"><h2 class="scene-title">❌ 场景不存在</h2><div class="choices"><button class="choice-btn" onclick="renderScene(\'bio_intro\')">🔙 返回入口</button></div></div>'; return; }
            let choicesHtml = scene.choices.map(choice => { const concept = choice.concept ? `, "${choice.concept}"` : ''; return `<button class="choice-btn" onclick="navigateTo('${choice.next}'${concept})">${choice.text}</button>`; }).join('');
            document.getElementById('game-container').innerHTML = '<div class="scene fade-in"><h2 class="scene-title">' + scene.title + '</h2><div class="scene-text">' + scene.text + '</div><div class="choices">' + choicesHtml + '</div></div>';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function navigateTo(sceneId, conceptName) {
            if (conceptName && !gameData.concepts.includes(conceptName)) { gameData.concepts.push(conceptName); gameData.score += 10; alert('📦 获得新概念：' + conceptName + ' (+10 分)'); updateStatus(); }
            renderScene(sceneId);
        }
        function updateStatus() { document.getElementById('concept-count').textContent = gameData.concepts.length; document.getElementById('score').textContent = gameData.score; document.getElementById('achievement-count').textContent = gameData.achievements.length; }
        renderScene('bio_intro');
    </script>
</body>
</html>
